<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>קריוקי מזרחית</title>
<style>
*{box-sizing:border-box;margin:0;padding:0;}
body{font-family:Arial,sans-serif;background:#121212;color:#fff;direction:rtl;min-height:100vh;padding-bottom:80px;}

/* TOP BAR */
.top{background:rgba(18,18,18,.97);backdrop-filter:blur(20px);border-bottom:1px solid #282828;padding:2px 24px;position:sticky;top:0;z-index:10;}
.top-row{min-height:68px;display:flex;align-items:center;justify-content:center;}
.brand{position:absolute;right:12px;top:50%;transform:translateY(-50%);display:flex;align-items:center;}

/* SEARCH SECTION */
.search-section{width:860px;max-width:calc(100% - 24px);display:flex;align-items:center;gap:12px;flex-shrink:0;}
.yt-search{position:relative;flex:1;display:flex;align-items:center;direction:ltr;background:#fff;border-radius:24px;border:1px solid #ddd;height:38px;padding:0 12px;gap:8px;transition:box-shadow .2s;}
.yt-search:focus-within{box-shadow:0 0 0 2px #1DB954;border-color:transparent;}
.yt-search-icon{display:flex;align-items:center;color:#555;flex-shrink:0;cursor:pointer;}
.yt-search input{flex:1;border:none;outline:none;font-size:16px;color:#121212;background:transparent;direction:rtl;font-family:Arial,sans-serif;min-width:0;}
.yt-search input::placeholder{color:#aaa;}
.yt-clear{background:none;border:none;cursor:pointer;color:#999;font-size:18px;line-height:1;display:none;flex-shrink:0;}
.yt-clear.visible{display:block;}
.yt-history{position:absolute;top:calc(100% + 6px);left:0;right:0;background:#fff;border-radius:14px;box-shadow:0 4px 24px rgba(0,0,0,.18);display:none;z-index:200;overflow:hidden;}
.yt-history.open{display:block;}
.yt-hist-item{display:flex;align-items:center;gap:10px;padding:10px 16px;cursor:pointer;color:#222;font-size:14px;font-family:Arial,sans-serif;direction:rtl;}
.yt-hist-item:hover{background:#f5f5f5;}
.yt-hist-item svg{flex-shrink:0;color:#888;}
.yt-hist-clear{text-align:center;padding:8px;font-size:12px;color:#888;cursor:pointer;border-top:1px solid #eee;}
.yt-hist-clear:hover{background:#f5f5f5;color:#e00;}
.stats{color:#B3B3B3;font-size:12px;}.stats b{color:#1DB954;}
.toolbar-btn{display:flex;align-items:center;gap:6px;background:#282828;border:none;color:#B3B3B3;border-radius:8px;padding:6px 12px;font-size:12px;font-weight:600;cursor:pointer;transition:background .15s,color .15s;font-family:Arial,sans-serif;}
.toolbar-btn:hover{background:#333;color:#fff;}
.toolbar-btn .bc{transition:transform .25s;display:flex;align-items:center;}
.all-closed .bc{transform:rotate(-90deg);}

/* CONTENT */
.content{padding:20px 16px;max-width:860px;margin:0 auto;}
.artist-block{margin-bottom:14px;background:#181818;border-radius:12px;overflow:hidden;}
.artist-block:hover{background:#1c1c1c;}
.artist-header{display:flex;align-items:center;gap:12px;padding:12px 16px;background:#282828;cursor:pointer;user-select:none;}
.artist-header:hover{background:#303030;}
.artist-avatar{width:60px;height:60px;background:linear-gradient(135deg,#1DB954,#0d7a38);border-radius:50%;display:flex;align-items:center;justify-content:center;font-weight:800;font-size:20px;color:#000;flex-shrink:0;overflow:hidden;background-size:cover;background-position:center top;}
.artist-avatar.has-photo{box-shadow:0 2px 8px rgba(0,0,0,.5);}
.artist-name-text{font-size:17px;font-weight:700;flex:1;}
.chevron{color:#B3B3B3;transition:transform .25s;display:flex;align-items:center;}
.artist-block[data-open="false"] .chevron{transform:rotate(-90deg);}
.songs-wrap{overflow:hidden;}
.artist-block[data-open="false"] .songs-wrap{display:none;}

/* SONGS TABLE */
.songs-table{width:100%;border-collapse:collapse;}
.songs-table tr{border-bottom:1px solid rgba(255,255,255,.04);transition:background .1s;}
.songs-table tr:last-child{border-bottom:none;}
.songs-table tr:hover{background:rgba(255,255,255,.05);}
.songs-table td{padding:10px 14px;font-size:15px;color:#B3B3B3;vertical-align:middle;}
.songs-table tr:hover td{color:#fff;}
.td-num{width:28px;text-align:center;color:#535353;font-size:14px;}
.td-actions{width:112px;text-align:left;}
.song-actions{display:flex;align-items:center;gap:5px;justify-content:flex-start;}

/* ACTION BUTTONS */
.btn-play{width:30px;height:30px;border-radius:50%;background:#fff;border:none;cursor:pointer;display:flex;align-items:center;justify-content:center;flex-shrink:0;transition:transform .15s,background .15s;padding-right:1px;}
.btn-play:hover{transform:scale(1.1);background:#e8e8e8;}
.btn-play svg{width:12px;height:14px;}
.btn-add{width:28px;height:28px;border-radius:50%;background:none;border:1.5px solid #444;color:#B3B3B3;cursor:pointer;display:flex;align-items:center;justify-content:center;flex-shrink:0;font-size:16px;line-height:1;transition:all .15s;}
.btn-add:hover,.btn-add.in-queue{background:#1DB954;border-color:#1DB954;color:#000;}
.btn-yt{width:28px;height:20px;background:#FF0000;border-radius:5px;display:inline-flex;align-items:center;justify-content:center;text-decoration:none;transition:transform .15s,opacity .15s;opacity:.85;flex-shrink:0;}
.btn-yt:hover{opacity:1;transform:scale(1.08);}

/* LAYOUT */
:root{--top-h:120px;}
.page-body{display:flex;}
.list-panel{flex:1;min-width:0;}
body.playing .content{max-width:none;margin:0;}

/* PLAYER PANEL */
.player-panel{flex:0 0 75%;display:none;flex-direction:column;background:#181818;border-right:1px solid #282828;}
.panel-header{display:flex;align-items:center;gap:12px;padding:14px 18px;background:#222;border-bottom:1px solid #333;flex-shrink:0;}
.panel-song-info{flex:1;min-width:0;}
.panel-song-name{font-size:15px;font-weight:700;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}
.panel-artist-name{font-size:12px;color:#B3B3B3;margin-top:2px;}
.panel-close{background:none;border:none;color:#888;cursor:pointer;font-size:22px;width:36px;height:36px;display:flex;align-items:center;justify-content:center;border-radius:50%;transition:background .15s,color .15s;flex-shrink:0;}
.panel-close:hover{background:#333;color:#fff;}
.panel-pip-btn{display:none;background:none;border:none;color:#1DB954;cursor:pointer;width:36px;height:36px;align-items:center;justify-content:center;border-radius:50%;transition:background .15s;flex-shrink:0;}
.panel-pip-btn:hover{background:#1a3a22;}
@media(max-width:767px){.panel-pip-btn{display:flex;}}
.panel-video{position:relative;flex:1;min-height:0;background:#000;}
.panel-video iframe{position:absolute;inset:0;width:100%;height:100%;}
.panel-footer{display:flex;align-items:center;gap:8px;padding:12px 18px;background:#222;border-top:1px solid #333;flex-shrink:0;}
.modal-nav-btn{background:#282828;border:none;color:#B3B3B3;border-radius:8px;padding:7px 14px;font-size:12px;font-weight:600;cursor:pointer;font-family:Arial,sans-serif;transition:background .15s,color .15s;display:flex;align-items:center;gap:5px;}
.modal-nav-btn:hover{background:#383838;color:#fff;}
.modal-nav-btn:disabled{opacity:.35;cursor:default;}
.modal-queue-info{flex:1;text-align:center;font-size:12px;color:#B3B3B3;}
.modal-queue-info b{color:#1DB954;}
.modal-add-btn{background:#1DB954;border:none;color:#000;border-radius:8px;padding:7px 14px;font-size:12px;font-weight:700;cursor:pointer;font-family:Arial,sans-serif;transition:opacity .15s;}
.modal-add-btn:hover{opacity:.85;}
.modal-add-btn.in-queue{background:#535353;color:#B3B3B3;}

/* DESKTOP PLAYING: compact top bar + side-by-side */
@media(min-width:768px){
  body.playing .page-body{height:calc(100dvh - var(--top-h));overflow:hidden;}
  body.playing .player-panel{display:flex;height:100%;}
  body.playing .list-panel{overflow-y:auto;height:100%;}
  body.playing .brand img{width:200px !important;height:55px !important;}
  body.playing .top{padding:8px 24px;}
  body.playing .top-row{min-height:60px;}
}

/* MOBILE: overlay + mini bar */
@media(max-width:767px){
  .player-panel{position:fixed;inset:0;z-index:300;flex-direction:column;background:#181818;}
  .player-panel.open{display:flex;}
  body.playing{padding-bottom:70px;}body.has-song{padding-bottom:57px;}
  body.playing .queue-bar{bottom:90px;}

  /* Mobile top bar layout */
  .top-row{flex-direction:column;align-items:stretch;gap:6px;min-height:unset;padding:8px 0 6px;}
  .brand{position:static;transform:none;display:flex;justify-content:center;}
  .search-section{width:100%;max-width:100%;flex-wrap:wrap;gap:8px;}
  /* Hide button text on mobile - icons only */
  .toolbar-btn .btn-label{display:none;}
}

/* ── FLOAT PLAYER (PiP) ── */
/* flex column: video on top, drag-bar below — no overlay blocking the iframe */
.float-player{position:fixed;left:0;top:0;width:220px;border-radius:14px;overflow:hidden;box-shadow:0 10px 36px rgba(0,0,0,.9);z-index:9999;display:none;background:#111;touch-action:none;user-select:none;}
.float-player.visible{display:flex;flex-direction:column;}
.float-player.pip-snap{transition:left .2s cubic-bezier(.25,.46,.45,.94),top .2s cubic-bezier(.25,.46,.45,.94);}
/* video slot — explicit height, no overlay blocking it */
#float-video-slot{width:100%;height:124px;position:relative;overflow:hidden;background:#000;flex-shrink:0;}
#float-video-slot #yt-player{width:100%!important;height:100%!important;}
#float-video-slot #yt-player iframe{width:100%!important;height:100%!important;display:block!important;}
/* bottom bar — this is the drag handle; video above is fully interactive */
.float-bar{display:flex;align-items:center;background:#1a1a1a;padding:4px 5px 4px 8px;gap:2px;cursor:grab;touch-action:none;flex-shrink:0;border-top:1px solid #2a2a2a;}
.float-bar.grabbing{cursor:grabbing;}
.float-bar-song{flex:1;font-size:10px;color:#bbb;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;direction:rtl;min-width:0;pointer-events:none;line-height:1.3;}
.fbar-btn{background:none;border:none;color:#888;cursor:pointer;font-size:12px;width:26px;height:26px;display:flex;align-items:center;justify-content:center;border-radius:50%;transition:color .12s,background .12s;flex-shrink:0;}
.fbar-btn:hover,.fbar-btn:active{color:#fff;background:rgba(255,255,255,.15);}
#pipPlayBtn{font-size:15px;color:#ddd;}
body.float-playing .mini-bar{display:none!important;}
@media(max-width:767px){
  .float-player{width:185px;}
  #float-video-slot{height:104px;}
  body.float-playing{padding-bottom:16px;}
}

/* MINI BAR */
.mini-bar{display:none;position:fixed;bottom:0;left:0;right:0;background:#1e1e1e;border-top:1px solid #333;border-radius:16px 16px 0 0;padding:3px 16px 10px;z-index:200;align-items:center;gap:12px;cursor:pointer;box-shadow:0 -4px 24px rgba(0,0,0,.5);}
body.has-song:not(.playing) .mini-bar{display:flex;}
.mini-thumb{width:44px;height:44px;border-radius:8px;background:#333;flex-shrink:0;background-size:cover;background-position:center;}
.mini-info{flex:1;min-width:0;}
.mini-song{font-size:13px;font-weight:700;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}
.mini-artist{font-size:11px;color:#B3B3B3;margin-top:2px;}
.mini-ctrl{background:none;border:none;color:#fff;cursor:pointer;font-size:20px;width:36px;height:36px;display:flex;align-items:center;justify-content:center;border-radius:50%;flex-shrink:0;transition:background .15s;}
.mini-ctrl:hover{background:rgba(255,255,255,.1);}

/* QUEUE BAR */
.queue-bar{position:fixed;bottom:16px;left:50%;transform:translateX(-50%) translateY(80px);z-index:200;background:#1DB954;border-radius:500px;padding:10px 20px;display:flex;align-items:center;gap:10px;box-shadow:0 8px 24px rgba(0,0,0,.5);transition:transform .3s,opacity .3s;opacity:0;white-space:nowrap;}
.queue-bar.visible{transform:translateX(-50%) translateY(0);opacity:1;}
.queue-bar-text{font-size:13px;font-weight:700;color:#000;}
.queue-play-btn{background:#000;color:#1DB954;border:none;border-radius:500px;padding:5px 14px;font-size:12px;font-weight:700;cursor:pointer;font-family:Arial,sans-serif;}
.queue-clear-btn{background:none;border:none;color:rgba(0,0,0,.6);cursor:pointer;font-size:18px;line-height:1;padding:0 0 0 4px;}

mark{background:rgba(29,185,84,.2);color:#1DB954;border-radius:3px;padding:0 2px;font-weight:700;}
.no-results{text-align:center;padding:60px 20px;color:#B3B3B3;font-size:15px;}

/* QUEUE PANEL */
.queue-panel{position:fixed;bottom:0;left:0;right:0;max-height:65vh;overflow-y:auto;background:#1a1a1a;border-top:2px solid #1DB954;border-radius:20px 20px 0 0;z-index:600;transform:translateY(110%);transition:transform .35s cubic-bezier(.4,0,.2,1);}
.queue-panel.open{transform:translateY(0);}
.queue-panel-header{display:flex;align-items:center;justify-content:space-between;padding:16px 20px 12px;border-bottom:1px solid #333;position:sticky;top:0;background:#1a1a1a;z-index:1;}
.queue-panel-title{font-size:15px;font-weight:700;color:#fff;}
.queue-panel-actions{display:flex;gap:8px;align-items:center;}
.q-play-btn{background:#1DB954;border:none;color:#000;border-radius:8px;padding:7px 14px;font-size:12px;font-weight:700;cursor:pointer;font-family:Arial,sans-serif;}
.q-clear-btn{background:#333;border:none;color:#B3B3B3;border-radius:8px;padding:7px 12px;font-size:12px;cursor:pointer;font-family:Arial,sans-serif;}
.q-close-btn{background:none;border:none;color:#888;cursor:pointer;font-size:22px;width:32px;height:32px;display:flex;align-items:center;justify-content:center;border-radius:50%;}
.q-close-btn:hover{background:#333;color:#fff;}
.queue-item{display:flex;align-items:center;padding:10px 20px;gap:12px;border-bottom:1px solid rgba(255,255,255,.04);transition:background .1s;cursor:pointer;}
.queue-item:hover{background:rgba(255,255,255,.05);}
.qi-num{color:#535353;font-size:12px;min-width:20px;text-align:center;flex-shrink:0;}
.qi-thumb{width:42px;height:42px;border-radius:6px;background:#333;flex-shrink:0;background-size:cover;background-position:center;}
.qi-info{flex:1;min-width:0;}
.qi-name{font-size:13px;color:#fff;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}
.qi-artist{font-size:11px;color:#B3B3B3;margin-top:2px;}
.qi-rm{background:none;border:none;color:#535353;cursor:pointer;font-size:18px;width:30px;height:30px;display:flex;align-items:center;justify-content:center;border-radius:50%;transition:all .15s;flex-shrink:0;}
.qi-rm:hover{background:#333;color:#e04;}
.queue-overlay{position:fixed;inset:0;background:rgba(0,0,0,.6);z-index:599;display:none;}
.queue-overlay.open{display:block;}
</style>
</head>

// ── QUEUE ──
let queue=[], ytPlayer=null, playerReady=false;
// currentSong: what's open in modal right now
let currentSong=null, currentSongList=[], currentSongIdx=0;

function onYouTubeIframeAPIReady(){
  ytPlayer=new YT.Player('yt-player',{
    width:'100%',height:'100%',
    playerVars:{autoplay:1,rel:0,modestbranding:1},
    events:{
      onReady:()=>{playerReady=true;const ifr=document.querySelector('#yt-player iframe');if(ifr)ifr.setAttribute('allow',(ifr.getAttribute('allow')||'')+';picture-in-picture');},
      onStateChange:(e)=>{if(e.data===YT.PlayerState.ENDED)modalNav(1);const b=document.getElementById('miniPlayBtn');if(b)b.textContent=e.data===YT.PlayerState.PLAYING?'⏸':'▶';}
    }
  });
}

function addToQueue(song){
  if(queue.some(s=>s.v===song.v))return;
  queue.push(song);
  updateQueueBar();
  refreshAddBtns();
}
function removeFromQueue(vid){
  queue=queue.filter(s=>s.v!==vid);
  updateQueueBar();
  refreshAddBtns();
}
function clearQueue(){queue=[];updateQueueBar();refreshAddBtns();}
function isInQueue(vid){return queue.some(s=>s.v===vid);}

function updateQueueBar(){
  const bar=document.getElementById('queueBar');
  bar.className='queue-bar'+(queue.length>0?' visible':'');
  document.getElementById('queueBarText').textContent=`${queue.length} ${queue.length===1?'שיר':'שירים'} בפלייליסט`;
}
function refreshAddBtns(){
  document.querySelectorAll('.btn-add[data-vid]').forEach(b=>{
    b.className='btn-add'+(isInQueue(b.dataset.vid)?' in-queue':'');
    b.title=isInQueue(b.dataset.vid)?'הסר מהפלייליסט':'הוסף לפלייליסט';
  });
  updateModalAddBtn();
}
function toggleAddSong(vid){
  const song=ALL.find(s=>s.v===vid);
  if(!song)return;
  if(isInQueue(vid))removeFromQueue(vid);
  else addToQueue(song);
}

// ── PLAYER ──
function setTopH(){document.documentElement.style.setProperty('--top-h',document.querySelector('.top').offsetHeight+'px');}
window.addEventListener('resize',()=>{setTopH();if(window.innerWidth>=768){document.getElementById('playerPanel').classList.remove('open');document.body.style.overflow='';}});
setTopH();

function playVid(vid){
  const song=ALL.find(s=>s.v===vid);
  if(!song)return;
  const songList=ALL.filter(s=>s.a===song.a);
  const idx=songList.findIndex(s=>s.v===vid);
  openModal(song,songList,idx);
}

function openModal(song,songList,idx,startSeconds){
  hideFloatPlayer();
  currentSong=song;currentSongList=songList;currentSongIdx=idx;
  document.getElementById('panelSong').textContent=song.s;
  document.getElementById('panelArtist').textContent=song.a;
  document.getElementById('miniSong').textContent=song.s;
  document.getElementById('miniArtist').textContent=song.a;
  document.getElementById('miniThumb').style.backgroundImage=`url('https://i.ytimg.com/vi/${song.v}/mqdefault.jpg')`;
  const start=startSeconds||0;
  if(ytPlayer&&playerReady)ytPlayer.loadVideoById({videoId:song.v,startSeconds:start});
  else setTimeout(()=>{if(ytPlayer&&playerReady)ytPlayer.loadVideoById({videoId:song.v,startSeconds:start});},500);
  document.body.classList.add('playing');
  document.body.classList.add('has-song');
  if(window.innerWidth<768){document.getElementById('playerPanel').classList.add('open');document.body.style.overflow='hidden';}
  requestAnimationFrame(setTopH);
  document.getElementById('miniPlayBtn').textContent='⏸';
  updateModalNav();
  updateModalAddBtn();
  saveSession(song);
}
function openFullPlayer(){
  // Mobile: expand mini bar to full overlay
  document.getElementById('playerPanel').classList.add('open');
  document.body.classList.add('playing');
  document.body.style.overflow='hidden';
}
async function mobilePiP(){
  document.getElementById('playerPanel').classList.remove('open');
  document.body.classList.remove('playing');
  document.body.style.overflow='';
  if(!currentSong)return;
  // Try native Document Picture-in-Picture (Chrome 116+ desktop / Edge 116+)
  if('documentPictureInPicture' in window){
    try{
      const ytEl=document.getElementById('yt-player');
      const pipWin=await documentPictureInPicture.requestWindow({width:320,height:212});
      const st=pipWin.document.createElement('style');
      st.textContent='*{box-sizing:border-box;margin:0;padding:0}body{background:#000;font-family:Arial,sans-serif;overflow:hidden}'+
        '#yt-player,#yt-player iframe{width:320px!important;height:180px!important;display:block!important;position:static!important;}'+
        '.pb{display:flex;align-items:center;background:#181818;padding:5px 8px;gap:5px;border-top:1px solid #2a2a2a;}'+
        '.pt{flex:1;font-size:11px;color:#bbb;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;direction:rtl;}'+
        '.pa{background:none;border:none;color:#aaa;font-size:14px;cursor:pointer;width:28px;height:28px;border-radius:50%;display:flex;align-items:center;justify-content:center;}'+
        '.pa:hover{background:#333;color:#fff;}';
      pipWin.document.head.appendChild(st);
      // Force iframe dimensions
      const ifr=ytEl.querySelector('iframe');
      if(ifr)ifr.style.cssText='width:320px!important;height:180px!important;display:block!important;position:static!important;';
      // Build toolbar
      const bar=pipWin.document.createElement('div');bar.className='pb';
      const titleEl=pipWin.document.createElement('div');titleEl.className='pt';
      titleEl.textContent=currentSong.s+(currentSong.a?' – '+currentSong.a:'');
      const playBtn=pipWin.document.createElement('button');playBtn.className='pa';playBtn.textContent='⏸';
      playBtn.addEventListener('click',()=>{
        if(!ytPlayer||!playerReady)return;
        const pl=ytPlayer.getPlayerState()===YT.PlayerState.PLAYING;
        pl?ytPlayer.pauseVideo():ytPlayer.playVideo();
        playBtn.textContent=pl?'▶':'⏸';
      });
      const expBtn=pipWin.document.createElement('button');expBtn.className='pa';expBtn.title='פתח';expBtn.textContent='⛶';
      expBtn.addEventListener('click',()=>{
        pipWin.close(); // pagehide handler moves player back
        setTimeout(()=>{
          document.getElementById('playerPanel').classList.add('open');
          document.body.classList.add('playing');
          document.body.style.overflow='hidden';
          requestAnimationFrame(setTopH);
        },60);
      });
      bar.append(titleEl,playBtn,expBtn);
      pipWin.document.body.append(ytEl,bar);
      document.body.classList.add('float-playing');
      // On close: restore player to main panel
      pipWin.addEventListener('pagehide',()=>{
        if(ifr)ifr.style.cssText='';
        const slot=document.getElementById('panel-video-slot');
        if(ytEl.parentNode!==slot)slot.appendChild(ytEl);
        document.body.classList.remove('float-playing');
      });
      return;
    }catch(e){console.log('Document PiP not available:',e);}
  }
  // Fallback: custom draggable float player
  showFloatPlayer();
}
function closePanelOrAll(){
  if(window.innerWidth<768){
    // X button on mobile: close everything
    document.getElementById('playerPanel').classList.remove('open');
    document.body.classList.remove('playing');
    document.body.style.overflow='';
    hideFloatPlayer();
    if(ytPlayer&&playerReady)ytPlayer.stopVideo();
    document.body.classList.remove('has-song');
  } else {
    closeModal();
  }
}
function closeModal(){
  document.body.classList.remove('playing');
  document.getElementById('playerPanel').classList.remove('open');
  document.body.style.overflow='';
  requestAnimationFrame(setTopH);
  if(window.innerWidth>=768&&currentSong){showFloatPlayer();return;}
  if(ytPlayer&&playerReady)ytPlayer.stopVideo();
  // keep has-song so mini bar stays (like Spotify)
}
function clearSession(){
  currentSong=null;
  document.body.classList.remove('has-song');
  try{localStorage.removeItem('karaokeSession');}catch(e){}
}
function miniPlayPause(){
  if(!ytPlayer||!playerReady)return;
  const s=ytPlayer.getPlayerState();
  if(s===YT.PlayerState.PLAYING){ytPlayer.pauseVideo();document.getElementById('miniPlayBtn').textContent='▶';}
  else{ytPlayer.playVideo();document.getElementById('miniPlayBtn').textContent='⏸';}
}
function modalNav(dir){
  const next=currentSongIdx+dir;
  if(next<0||next>=currentSongList.length)return;
  currentSongIdx=next;
  currentSong=currentSongList[next];
  document.getElementById('panelSong').textContent=currentSong.s;
  document.getElementById('panelArtist').textContent=currentSong.a;
  document.getElementById('miniSong').textContent=currentSong.s;
  document.getElementById('miniArtist').textContent=currentSong.a;
  document.getElementById('miniThumb').style.backgroundImage=`url('https://i.ytimg.com/vi/${currentSong.v}/mqdefault.jpg')`;
  if(ytPlayer&&playerReady)ytPlayer.loadVideoById(currentSong.v);
  updateModalNav();
  updateModalAddBtn();
  saveSession(currentSong);
}
function updateModalNav(){
  document.getElementById('btnPrev').disabled=currentSongIdx<=0;
  document.getElementById('btnNext').disabled=currentSongIdx>=currentSongList.length-1;
  const info=document.getElementById('modalQueueInfo');
  info.innerHTML=currentSongList.length>1?`שיר <b>${currentSongIdx+1}</b> מתוך <b>${currentSongList.length}</b>`:'';
}
function updateModalAddBtn(){
  if(!currentSong)return;
  const btn=document.getElementById('modalAddBtn');
  const inQ=isInQueue(currentSong.v);
  btn.className='modal-add-btn'+(inQ?' in-queue':'');
  btn.textContent=inQ?'✓ בפלייליסט':'+ הוסף לפלייליסט';
}
function toggleCurrentInQueue(){
  if(!currentSong)return;
  toggleAddSong(currentSong.v);
}
function playQueue(){
  if(!queue.length)return;
  openModal(queue[0],queue,0);
}

function showFloatPlayer(){

  if(ifr){ifr.style.cssText='position:static!important;width:100%!important;height:100%!important;display:block!important;';}
  // Song label
  if(currentSong)document.getElementById('floatSong').textContent=currentSong.s+(currentSong.a?' – '+currentSong.a:'');
  // Play/pause button state
  const pb=document.getElementById('pipPlayBtn');
  if(pb&&ytPlayer&&playerReady)pb.textContent=ytPlayer.getPlayerState()===YT.PlayerState.PLAYING?'⏸':'▶';
  // Set initial position (left only — avoids RTL right-takes-precedence bug)
  if(!fp._pipPositioned){
    const pw=window.innerWidth<768?185:220;
    fp.style.left=(window.innerWidth-pw-12)+'px';
    fp.style.top=(window.innerHeight-180)+'px';
    fp._pipPositioned=true;
  }
  fp.style.right='auto';
  fp.classList.add('visible');
  document.body.classList.add('float-playing');
}

function hideFloatPlayer(){
  const fp=document.getElementById('floatPlayer');
  const panelSlot=document.getElementById('panel-video-slot');
  const ytEl=document.getElementById('yt-player');
  if(ytEl&&panelSlot&&ytEl.parentNode!==panelSlot){
    const ifr=ytEl.querySelector('iframe');
    if(ifr)ifr.style.cssText=''; // restore original iframe style
    panelSlot.appendChild(ytEl);
  }
  if(fp){fp.classList.remove('visible');fp.style.display='none';}
  document.body.classList.remove('float-playing');
}

function closeFloat(){
  hideFloatPlayer();
  if(ytPlayer&&playerReady)ytPlayer.stopVideo();
  document.body.classList.remove('has-song');
}

function expandFloat(){
  hideFloatPlayer();
  if(window.innerWidth>=768){document.body.classList.add('playing');}
  else{document.getElementById('playerPanel').classList.add('open');document.body.classList.add('playing');document.body.style.overflow='hidden';}
  requestAnimationFrame(setTopH);
}

function pipPlayPause(){
  if(!ytPlayer||!playerReady)return;
  const playing=ytPlayer.getPlayerState()===YT.PlayerState.PLAYING;
  playing?ytPlayer.pauseVideo():ytPlayer.playVideo();
  const pb=document.getElementById('pipPlayBtn');
  if(pb)pb.textContent=playing?'▶':'⏸';
}

function _snapToCorner(fp){
  const vw=window.innerWidth,vh=window.innerHeight;
  const r=fp.getBoundingClientRect();
  const m=12, bm=window.innerWidth<768?76:80;
  const goLeft=r.left+r.width/2<vw/2;
  const goTop=r.top+r.height/2<vh/2;
  fp.classList.add('pip-snap');
  fp.style.left=(goLeft?m:vw-r.width-m)+'px';
  fp.style.top=(goTop?m:vh-r.height-bm)+'px';
  fp.style.right='auto'; fp.style.bottom='auto';
  setTimeout(()=>fp.classList.remove('pip-snap'),280);
}

function initPiP(){
  const fp=document.getElementById('floatPlayer');
  const bar=document.getElementById('floatBar');
  if(!fp||!bar)return;

  // ── TOUCH drag via bottom bar ──
  bar.addEventListener('touchstart',e=>{
    // Don't start drag if tap is on a button
    if(e.target.closest('.fbar-btn'))return;
    _pipDrag=true;_pipMoved=false;
    const t=e.touches[0],r=fp.getBoundingClientRect();
    _pipSX=t.clientX;_pipSY=t.clientY;
    _pipOX=t.clientX-r.left;_pipOY=t.clientY-r.top;
    fp.style.left=r.left+'px';fp.style.top=r.top+'px';
    fp.style.right='auto';
    fp.classList.remove('pip-snap');
    bar.classList.add('grabbing');
  },{passive:true});

  document.addEventListener('touchmove',e=>{
    if(!_pipDrag)return;
    e.preventDefault();
    const t=e.touches[0];
    if(Math.abs(t.clientX-_pipSX)>5||Math.abs(t.clientY-_pipSY)>5)_pipMoved=true;
    fp.style.left=(t.clientX-_pipOX)+'px';
    fp.style.top=(t.clientY-_pipOY)+'px';
  },{passive:false});

  document.addEventListener('touchend',()=>{
    if(!_pipDrag)return;
    _pipDrag=false;
    bar.classList.remove('grabbing');
    if(!_pipMoved)return;
    const r=fp.getBoundingClientRect();
    if(r.right<-20||r.left>window.innerWidth+20){closeFloat();return;}
    _snapToCorner(fp);
  });

  // ── MOUSE drag via bottom bar (desktop) ──
  bar.addEventListener('mousedown',e=>{
    if(e.target.closest('.fbar-btn'))return;
    _pipDrag=true;_pipMoved=false;
    const r=fp.getBoundingClientRect();
    _pipSX=e.clientX;_pipSY=e.clientY;
    _pipOX=e.clientX-r.left;_pipOY=e.clientY-r.top;
    fp.style.left=r.left+'px';fp.style.top=r.top+'px';
    fp.style.right='auto';
    fp.classList.remove('pip-snap');
    bar.classList.add('grabbing');
    e.preventDefault();
  });
  document.addEventListener('mousemove',e=>{
    if(!_pipDrag)return;
    if(Math.abs(e.clientX-_pipSX)>4)_pipMoved=true;
    fp.style.left=(e.clientX-_pipOX)+'px';
    fp.style.top=(e.clientY-_pipOY)+'px';
  });
  document.addEventListener('mouseup',()=>{
    if(!_pipDrag)return;
    _pipDrag=false;
    bar.classList.remove('grabbing');
    if(_pipMoved)_snapToCorner(fp);
  });
}
document.addEventListener('DOMContentLoaded',initPiP);
// Mobile player gestures (YouTube-style)
function initMobileGestures(){
  // Swipe down on full player → minimize to mini player
  let pSY=0,pSX=0;
  const panel=document.getElementById('playerPanel');
  panel.addEventListener('touchstart',e=>{pSY=e.touches[0].clientY;pSX=e.touches[0].clientX;},{passive:true});
  panel.addEventListener('touchend',e=>{
    if(window.innerWidth>=768)return;
    const dy=e.changedTouches[0].clientY-pSY;
    const dx=Math.abs(e.changedTouches[0].clientX-pSX);
    if(dy>80&&dx<120&&panel.classList.contains('open'))mobilePiP();
  },{passive:true});
  // Float player expand/close handled by ⛶ and ✕ buttons
}
document.addEventListener('DOMContentLoaded',initMobileGestures);

function expandAll(){document.querySelectorAll('.artist-block').forEach(b=>b.dataset.open='true');}
function collapseAll(){document.querySelectorAll('.artist-block').forEach(b=>b.dataset.open='false');}
function updateToggleBtn(){}
function hl(t,q){if(!q)return esc(t);return esc(t).replace(new RegExp('('+q.replace(/[.*+?^${}()|[\]\\]/g,'\\$&')+')','gi'),'<mark>$1</mark>');}

async function fetchArtistImg(name){
  // 1. Wikipedia Hebrew
  try{const r=await fetch(`https://he.wikipedia.org/api/rest_v1/page/summary/${encodeURIComponent(name.replace(/ /g,'_'))}`);
    if(r.ok){const d=await r.json();if(d.thumbnail?.source)return d.thumbnail.source;}
  }catch(e){}
  // 2. iTunes — search by song (artworkUrl100 only exists on song/album results)
  try{const r=await fetch(`https://itunes.apple.com/search?term=${encodeURIComponent(name)}&entity=song&limit=5&country=IL`);
    if(r.ok){const d=await r.json();
      for(const s of(d.results||[])){
        // make sure it's the right artist
        if(s.artworkUrl100&&s.artistName&&s.artistName.toLowerCase().includes(name.slice(0,3).toLowerCase())){
          return s.artworkUrl100.replace('100x100bb','600x600bb');
        }
      }
      // fallback: first result regardless
      if(d.results?.[0]?.artworkUrl100)return d.results[0].artworkUrl100.replace('100x100bb','600x600bb');
    }
  }catch(e){}
  return null;
}

async function loadImages(){
  const avatars=document.querySelectorAll('.artist-avatar[data-artist]');
  const promises=[];
  for(const el of avatars){
    const name=el.dataset.artist;
    if(IMG_CACHE[name]&&IMG_CACHE[name]!=='none'){applyPhoto(el,IMG_CACHE[name]);continue;}
    if(IMG_CACHE[name]==='none')continue;
    promises.push((async()=>{
      const url=await fetchArtistImg(name);
      if(url){IMG_CACHE[name]=url;document.querySelectorAll(`.artist-avatar[data-artist="${CSS.escape(name)}"]`).forEach(e=>applyPhoto(e,url));}
      else IMG_CACHE[name]='none';
    })());
  }
  await Promise.all(promises);
}

function render(term){
  const q=(term||'').trim().toLowerCase();
  const g={};const ord=[];
  ALL.forEach(r=>{
    const mt=!q||r.s.toLowerCase().includes(q)||r.a.toLowerCase().includes(q);
    if(!mt)return;
    if(!g[r.a]){g[r.a]=[];ord.push(r.a);}
    g[r.a].push(r);
  });
  let h='';
  if(!ord.length){h='<div style="text-align:center;color:#535353;padding:60px 20px">לא נמצאו תוצאות</div>';}
  for(const a of ord){
    const vid=g[a][0].v;
    h+=`<div class="artist-block" data-open="false">`;
    h+=`<div class="artist-header" onclick="toggleArtist(this)">`;
    h+=`<div class="artist-avatar" data-artist="${esc(a)}" data-vid="${vid}">${esc(a.slice(0,2))}</div>`;
    h+=`<span class="artist-name-text">${hl(a,q)}</span>`;
    h+=`<span class="chevron"><svg width="16" height="16" viewBox="0 0 16 16" fill="none"><path d="M4 6l4 4 4-4" stroke="#B3B3B3" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/></svg></span>`;
    h+=`</div><div class="songs-wrap"><table class="songs-table">`;
    g[a].forEach((r,i)=>{
      const inQ=queue.includes(r.v);
      h+=`<tr>
        <td class="td-num">${i+1}</td>
        <td onclick="playVid('${r.v}')" style="cursor:pointer">${hl(r.s,q)}</td>
        <td class="td-actions">
          <div class="song-actions">
            <button class="btn-play" onclick="event.stopPropagation();playVid('${r.v}')" title="נגן">
              <svg viewBox="0 0 12 14" fill="#000"><polygon points="0,0 12,7 0,14"/></svg>
            </button>
            <button class="btn-add${inQ?' in-queue':''}" data-vid="${r.v}" title="${inQ?'הסר מהפלייליסט':'הוסף לפלייליסט'}" onclick="event.stopPropagation();toggleAddSong('${r.v}')">${inQ?'✓':'+'}</button>
            <a class="btn-yt" href="https://www.youtube.com/watch?v=${r.v}" target="_blank" title="פתח ביוטיוב">${YT_ICO}</a>
          </div>
        </td>
      </tr>`;
    });
    h+='</table></div></div>';
  }
  document.getElementById('content').innerHTML=h;
  updateToggleBtn();
  loadImages();
}
function clearSearch(){const i=document.getElementById('q');i.value='';document.getElementById('clr').classList.remove('visible');render('');}

// ── SEARCH HISTORY ──
const HIST_KEY='karaoke_hist';
function getSearchHistory(){try{return JSON.parse(localStorage.getItem(HIST_KEY)||'[]');}catch(e){return[];}}
function saveSearchHistory(term){if(!term.trim())return;let h=getSearchHistory().filter(t=>t!==term);h.unshift(term);h=h.slice(0,8);try{localStorage.setItem(HIST_KEY,JSON.stringify(h));}catch(e){}}
function clearSearchHistory(){try{localStorage.removeItem(HIST_KEY);}catch(e){}hideSearchHistory();}
function showSearchHistory(){
  const h=getSearchHistory();
  const dd=document.getElementById('ytHistory');
  if(!h.length){dd.classList.remove('open');return;}
  dd.innerHTML=h.map(t=>`<div class="yt-hist-item" onmousedown="pickHistory('${t.replace(/'/g,"\\'").replace(/"/g,'&quot;')}')"><svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="10"/><polyline points="12 6 12 12 16 14"/></svg>${t}</div>`).join('')+'<div class="yt-hist-clear" onmousedown="clearSearchHistory()">נקה היסטוריה</div>';
  dd.classList.add('open');
}
function hideSearchHistory(){document.getElementById('ytHistory').classList.remove('open');}
function pickHistory(term){const i=document.getElementById('q');i.value=term;render(term);document.getElementById('clr').classList.add('visible');hideSearchHistory();saveSearchHistory(term);}

// ── QUEUE PANEL ──
function openQueuePanel(){
  const panel=document.getElementById('queuePanel');
  if(!panel)return;
  // Render queue
  const list=document.getElementById('queueList');
  if(list){
    if(!queue.length){list.innerHTML='<div style="padding:20px;text-align:center;color:#888;">הפלייליסט ריק</div>';
    }else{
      list.innerHTML=queue.map((s,i)=>`<div class="queue-item${currentSong&&currentSong.v===s.v?' active':''}" onclick="openModal(queue[${i}],queue,${i})">
        <span class="queue-num">${i+1}</span>
        <span class="queue-song-name">${s.s}</span>
        <span class="queue-artist-name">${s.a||''}</span>
        <button class="queue-remove-btn" onclick="event.stopPropagation();removeFromQueue('${s.v}')">✕</button>
      </div>`).join('');
    }
  }
  panel.classList.add('open');
}
function closeQueuePanel(){const panel=document.getElementById('queuePanel');if(panel)panel.classList.remove('open');}
function removeFromQueue(vid){queue=queue.filter(s=>s.v!==vid);updateQueueBar();if(document.getElementById('queuePanel')?.classList.contains('open'))openQueuePanel();}

// ── SESSION ──
const SESSION_KEY='karaoke_session';
function saveSession(song){try{localStorage.setItem(SESSION_KEY,JSON.stringify({v:song.v,s:song.s,a:song.a,list:songList.map(s=>s.v),idx:songList.findIndex(s=>s.v===song.v)}));}catch(e){}}
function loadSession(){
  try{
    const d=JSON.parse(localStorage.getItem(SESSION_KEY)||'null');
    if(!d)return;
    currentSong={v:d.v,s:d.s,a:d.a};
    document.body.classList.add('has-song');
    const mini=document.getElementById('miniSong');
    const miniA=document.getElementById('miniArtist');
    if(mini)mini.textContent=d.s;
    if(miniA)miniA.textContent=d.a||'';
    const thumb=document.getElementById('miniThumb');
    if(thumb)thumb.style.backgroundImage=`url(https://img.youtube.com/vi/${d.v}/default.jpg)`;
  }catch(e){}
}
function resumeOrOpen(){
  if(!currentSong)return;
  const saved=JSON.parse(localStorage.getItem(SESSION_KEY)||'null');
  if(saved&&saved.list){
    const songList2=ALL.filter(s=>saved.list.includes(s.v));
    const idx=Math.max(0,saved.list.indexOf(currentSong.v));
    openModal(currentSong,songList2,idx,0);
  }else{
    openModal(currentSong,[currentSong],0,0);
  }
  if(window.innerWidth<768)document.getElementById('playerPanel').classList.add('open');
}
setInterval(()=>{if(currentSong&&ytPlayer&&playerReady&&ytPlayer.getPlayerState()===YT.PlayerState.PLAYING)saveSession(currentSong);},5000);

loadSession();

document.getElementById('q').addEventListener('input',e=>{

  render(v);

  if(v.length>0)hideSearchHistory();else showSearchHistory();
});
document.addEventListener('keydown',e=>{
  if(e.key==='Escape')closeModal();
  if(e.key==='ArrowLeft'&&document.body.classList.contains('playing'))modalNav(-1);
  if(e.key==='ArrowRight'&&document.body.classList.contains('playing'))modalNav(1);
});
