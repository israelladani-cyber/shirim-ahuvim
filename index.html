var body=document.getElementById('_userMgmtBody');
var pending=content.pending||[];
var approved=content.approved||[];
var frozen=content.frozen||[];
var h='';
var pal=['#CC0000','#1565C0','#2E7D32','#6A1B9A','#E65100','#00695C','#0277BD','#558B2F'];
var avt=function(n,e){var i=(n?n.charCodeAt(0):e.charCodeAt(0))%pal.length;var l=(n&&n.length?n[0]:e[0]).toUpperCase();return '<div style="width:38px;height:38px;border-radius:50%;background:'+pal[i]+';color:#fff;display:flex;align-items:center;justify-content:center;font-size:16px;font-weight:700;flex-shrink:0;">'+l+'<\/div>';};
var sec=function(ic,tx,cn){return '<div style="padding:10px 16px 8px;background:#F9F9F9;border-bottom:1px solid #E5E5E5;display:flex;align-items:center;gap:8px;"><span style="font-size:14px;">'+ic+'<\/span><span style="font-size:13px;font-weight:700;color:#0F0F0F;">'+tx+'<\/span><span style="background:#E5E5E5;color:#606060;border-radius:10px;padding:1px 8px;font-size:11px;font-weight:600;margin-right:auto;">'+cn+'<\/span><\/div>';};
var rw=function(av,nm,em,bt){return '<div style="display:flex;align-items:center;padding:10px 16px;gap:10px;border-bottom:1px solid #F2F2F2;">'+av+'<div style="flex:1;min-width:0;text-align:right;overflow:hidden;"><div style="font-size:14px;font-weight:600;color:#0F0F0F;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;">'+nm+'<\/div><div style="font-size:12px;color:#606060;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;">'+em+'<\/div><\/div>'+(bt||'')+'<\/div>';};
var btw=function(lbl,act,se,sn,st){return '<button data-em="'+se+'" data-nm="'+sn+'" data-action="'+act+'" onclick="userAction(this.dataset.action,this.dataset.em,this.dataset.nm,this)" style="'+st+'">'+lbl+'<\/button>';};
h+=sec('✅','מאושרים',approved.length);
var shownApproved=0;
approved.forEach(function(item){
var em=(item.e||item),nm=(item.n||'');
var se=em.replace(/"/g,'&quot;'),sn=nm.replace(/"/g,'&quot;');
var isAdm=em.toLowerCase()==='israel.ladani@gmail.com';
if(isAdm){return;}
shownApproved++;
h+=rw(avt(nm,em),nm||em,em,'<div style="display:flex;gap:4px;flex-shrink:0;">'+btw('הקפא','freeze',se,sn,'background:#FFF8F0;color:#E65100;border:1px solid #FFCC80;border-radius:18px;padding:5px 12px;font-size:12px;cursor:pointer;')+btw('מחק','delete',se,sn,'background:#FFF0F0;color:#CC0000;border:1px solid #FECACA;border-radius:18px;padding:5px 12px;font-size:12px;cursor:pointer;')+'<\/div>');
});
if(!shownApproved)h+='<p style="color:#999;text-align:center;padding:16px;font-size:13px;margin:0;">אין משתמשים מאושרים<\/p>';
h+=sec('⏳','ממתינים לאישור',pending.length);
if(!pending.length)h+='<p style="color:#999;text-align:center;padding:16px;font-size:13px;margin:0;">אין ממתינים<\/p>';
pending.forEach(function(item){
var em=(item.e||item),nm=(item.n||'');
var se=em.replace(/"/g,'&quot;'),sn=nm.replace(/"/g,'&quot;');
h+=rw(avt(nm,em),nm||em,em,'<div style="display:flex;gap:4px;flex-shrink:0;">'+btw('✓ אשר','approve',se,sn,'background:#2CA55E;color:#fff;border:none;border-radius:18px;padding:5px 12px;font-size:12px;font-weight:600;cursor:pointer;')+btw('✕ דחה','reject',se,sn,'background:#FFF0F0;color:#CC0000;border:1px solid #FECACA;border-radius:18px;padding:5px 12px;font-size:12px;cursor:pointer;')+'<\/div>');
});
h+=sec('🔒','מוקפאים',frozen.length);
if(!frozen.length)h+='<p style="color:#999;text-align:center;padding:16px;font-size:13px;margin:0;">אין מוקפאים<\/p>';
frozen.forEach(function(item){
var em=(typeof item==='string'?item:(item.e||'')),nm=(typeof item==='string'?'':(item.n||''));
var se=em.replace(/"/g,'&quot;'),sn=nm.replace(/"/g,'&quot;');
h+=rw(avt(nm,em),nm||em,em,'<div style="display:flex;gap:4px;flex-shrink:0;">'+btw('אשר','approve',se,sn,'background:#2CA55E;color:#fff;border:none;border-radius:18px;padding:5px 12px;font-size:12px;font-weight:600;cursor:pointer;')+btw('מחק','delete',se,sn,'background:#FFF0F0;color:#CC0000;border:1px solid #FECACA;border-radius:18px;padding:5px 12px;font-size:12px;cursor:pointer;')+'<\/div>');
});
var rejected=content.rejected||[];
h+=sec('🚫','נדחו',rejected.length);
if(!rejected.length)h+='<p style="color:#999;text-align:center;padding:16px;font-size:13px;margin:0;">אין דחויים<\/p>';
rejected.forEach(function(item){
var em=(typeof item==='string'?item:(item.e||'')),nm=(typeof item==='string'?'':(item.n||''));
var se=em.replace(/"/g,'&quot;'),sn=nm.replace(/"/g,'&quot;');
h+=rw(avt(nm,em),nm||em,em,'<div style="display:flex;gap:4px;flex-shrink:0;">'+btw('אשר','approve',se,sn,'background:#2CA55E;color:#fff;border:none;border-radius:18px;padding:5px 12px;font-size:12px;font-weight:600;cursor:pointer;')+btw('מחק','delete',se,sn,'background:#FFF0F0;color:#CC0000;border:1px solid #FECACA;border-radius:18px;padding:5px 12px;font-size:12px;cursor:pointer;')+'<\/div>');
});
body.innerHTML=h;
}
async function loadUsersPanel(){
var body=document.getElementById('_userMgmtBody');
body.innerHTML='<p style="color:#999;text-align:center;margin:20px 0;">טוען...</p>';
try{
var r=await fetch(WORKER_BASE+'/status');
var content=await r.json();
_umContent=content;_umSha=null;
renderUsersPanel(content);
}catch(e){body.innerHTML='<p style="color:#CC0000;text-align:center;padding:20px;font-size:13px;">שגיאה בטעינת נתונים<\/p>';}
}
function _applyAction(content,action,email,name){
content.pending=(content.pending||[]).filter(function(x){return(typeof x==='string'?x:x.e)!==email;});
content.approved=(content.approved||[]).filter(function(x){return(typeof x==='string'?x:x.e)!==email;});
content.rejected=(content.rejected||[]).filter(function(x){return(typeof x==='string'?x:x.e)!==email;});
content.frozen=(content.frozen||[]).filter(function(x){return(typeof x==='string'?x:x.e)!==email;});
if(action==='approve')content.approved.push({e:email,n:name||email,t:Date.now()});
else if(action==='reject')content.rejected.push({e:email,n:name||email,t:Date.now()});
else if(action==='freeze')content.frozen.push({e:email,n:name||email,t:Date.now()});
return content;
}
async function userAction(action,email,name,btnEl){
var _cm={'delete':'מחיקת ','freeze':'הקפאת '};
if(_cm[action]!==undefined&&!confirm(_cm[action]+name+' — האם אתה בטוח?'))return;
// OPTIMISTIC: render the end-state instantly using cached data, before any network call
var optimistic=_umContent?JSON.parse(JSON.stringify(_umContent)):null;
if(optimistic){_applyAction(optimistic,action,email,name);renderUsersPanel(optimistic);}
var body=document.getElementById('_userMgmtBody');
var btns=body?body.querySelectorAll('button[data-em]'):[];
btns.forEach(function(b){b.disabled=true;b.style.opacity='.5';});
var res=await window._adminAction(window._umPin,action,email,name);
if(res.ok){loadUsersPanel();}else{alert('שגיאה בשמירה, נסה שוב'+(res.error?(' ('+res.error+')'):''));loadUsersPanel();}
}
</script>
