<html lang="he" dir="rtl">
<head>

<meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate">
<meta http-equiv="Pragma" content="no-cache">
<meta http-equiv="Expires" content="0">
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
<meta name="theme-color" content="#ffffff">
<title>קריוקי מזרחית</title>
<link rel="icon" type="image/svg+xml" href="logo%209.svg">
<link rel="icon" type="image/svg+xml" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 32 32'%3E%3Crect width='32' height='32' rx='6' fill='%23121212'/%3E%3Crect x='12' y='3' width='8' height='14' rx='4' fill='%231DB954'/%3E%3Cpath d='M8 15 Q8 24 16 24 Q24 24 24 15' fill='none' stroke='%231DB954' stroke-width='2.5' stroke-linecap='round'/%3E%3Cline x1='16' y1='24' x2='16' y2='28' stroke='%231DB954' stroke-width='2.5' stroke-linecap='round'/%3E%3Cline x1='11' y1='28' x2='21' y2='28' stroke='%231DB954' stroke-width='2.5' stroke-linecap='round'/%3E%3C/svg%3E">
<style>
*{box-sizing:border-box;margin:0;padding:0;}
body{font-family:Arial,sans-serif;background:#ffffff;color:#0F0F0F;direction:rtl;}

/* TOP BAR */
.top{background:#ffffff;border-bottom:1px solid #E5E5E5;padding:0 24px;position:relative;z-index:10;flex-shrink:0;}
.top-row{min-height:80px;display:flex;align-items:center;justify-content:center;}
.brand{position:absolute;right:12px;top:50%;transform:translateY(-50%);display:flex;align-items:center;cursor:pointer;}

/* SEARCH SECTION */
.search-section{width:860px;max-width:calc(100% - 24px);display:flex;align-items:center;gap:12px;flex-shrink:0;}
.yt-search{position:relative;flex:1;display:flex;align-items:center;direction:ltr;background:#ffffff;border-radius:24px;border:1px solid #ccc;height:38px;padding:0 12px;gap:8px;transition:box-shadow .2s;}
.yt-search:focus-within{box-shadow:0 0 0 2px #FF0000;border-color:transparent;}
.yt-search-icon{display:flex;align-items:center;color:#606060;flex-shrink:0;cursor:pointer;}
.yt-search input{flex:1;border:none;outline:none;font-size:16px;color:#121212;background:transparent;direction:rtl;font-family:Arial,sans-serif;min-width:0;}
.yt-search input::placeholder{color:#999;}
.yt-clear{background:none;border:none;cursor:pointer;color:#999;font-size:18px;line-height:1;display:none;flex-shrink:0;}
.yt-clear.visible{display:block;}
.yt-history{position:absolute;top:calc(100% + 6px);left:0;right:0;background:#fff;border-radius:14px;box-shadow:0 4px 24px rgba(0,0,0,.18);display:none;z-index:200;overflow:hidden;}
.yt-history.open{display:block;}
.yt-hist-item{display:flex;align-items:center;gap:10px;padding:10px 16px;cursor:pointer;color:#0F0F0F;font-size:14px;font-family:Arial,sans-serif;direction:rtl;}
.yt-hist-item:hover{background:#f5f5f5;}
.yt-hist-item svg{flex-shrink:0;color:#888;}
.yt-hist-clear{text-align:center;padding:8px;font-size:12px;color:#888;cursor:pointer;border-top:1px solid #eee;}
.yt-hist-clear:hover{background:#f5f5f5;color:#e00;}
.stats{color:#0F0F0F;font-size:12px;}.stats b{color:#FF0000;}
.toolbar-btn{display:flex;align-items:center;gap:6px;background:#F2F2F2;border:none;color:#0F0F0F;border-radius:8px;padding:6px 12px;font-size:12px;font-weight:600;cursor:pointer;transition:background .15s,color .15s;font-family:Arial,sans-serif;}
.toolbar-btn:hover{background:rgba(0,0,0,.07);color:#0F0F0F;}
.toolbar-btn .bc{transition:transform .25s;display:flex;align-items:center;}
.all-closed .bc{transform:rotate(-90deg);}

/* CONTENT */
.content{padding:20px 16px;max-width:860px;margin:0 auto;}
.artist-block{margin-bottom:14px;background:#FFFFFF;border-radius:12px;overflow:hidden;}
.artist-block:hover{background:#F2F2F2;}
.artist-header{display:flex;align-items:center;gap:12px;padding:6px 16px;background:#F2F2F2;cursor:pointer;user-select:none;}
.artist-header:hover{background:#E5E5E5;}
.playlist-block{margin-bottom:14px;background:#FFFFFF;border-radius:12px;overflow:hidden;}
.playlist-row{display:flex;align-items:center;gap:12px;padding:4px 16px;background:#F2F2F2;cursor:pointer;user-select:none;}
.playlist-row:hover{background:#E5E5E5;}
.playlist-row-avatar{width:34px;height:34px;border-radius:50%;background:#888;display:flex;align-items:center;justify-content:center;font-size:15px;color:#fff;flex-shrink:0;}
.playlist-row-info{flex:1;min-width:0;}
.playlist-row-name{font-weight:700;font-size:14px;color:#0F0F0F;}
.playlist-row-count{font-size:12px;color:#666;margin-top:2px;}
.playlist-row-chevron{font-size:11px;color:#666;transition:transform .2s;flex-shrink:0;}
.playlist-block[data-open="true"] .playlist-row-chevron{transform:rotate(180deg);}
.playlist-block-songs{display:none;}
.playlist-block[data-open="true"] .playlist-block-songs{display:block;}
.artist-avatar{width:60px;height:60px;background:linear-gradient(135deg,#FF0000,#CC0000);border-radius:50%;display:flex;align-items:center;justify-content:center;font-weight:800;font-size:20px;color:#000;flex-shrink:0;overflow:hidden;background-size:cover;background-position:center top;position:relative;}
.artist-avatar.has-photo{box-shadow:0 2px 8px rgba(0,0,0,.5);}
body.admin .artist-avatar{cursor:pointer;}
body.admin .artist-avatar::after{content:'📷';position:absolute;inset:0;display:none;align-items:center;justify-content:center;background:rgba(0,0,0,.45);font-size:22px;border-radius:50%;}
body.admin .artist-avatar:hover::after{display:flex;}
.artist-name-text{font-size:17px;font-weight:700;flex:1;color:#0F0F0F;}
.chevron{color:#0F0F0F;transition:transform .25s;display:flex;align-items:center;}
.artist-block[data-open="false"] .chevron{transform:rotate(-90deg);}
.songs-wrap{overflow:hidden;}
.artist-block[data-open="false"] .songs-wrap{display:none;}

/* SONGS TABLE */
.songs-table{width:100%;border-collapse:collapse;}
.songs-table tr{border-bottom:1px solid rgba(255,255,255,.04);transition:background .1s;}
.songs-table tr:last-child{border-bottom:none;}
.songs-table tr:hover{background:rgba(0,0,0,.05);}
.songs-table td{padding:10px 14px;font-size:15px;color:#0F0F0F;vertical-align:middle;}
.songs-table tr:hover td{color:#0F0F0F;}
.td-num{width:28px;text-align:center;color:#909090;font-size:14px;}
.td-actions{width:112px;}
.song-artist-sub{font-size:11px;color:#909090;margin-top:2px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}
.songs-table tr:hover .song-artist-sub{color:#888;}
.song-actions{display:flex;align-items:center;gap:5px;justify-content:flex-end;}

/* ACTION BUTTONS */
.btn-play{width:30px;height:30px;border-radius:50%;background:#FFFFFF;border:1px solid #E5E5E5;cursor:pointer;display:flex;align-items:center;justify-content:center;flex-shrink:0;transition:transform .15s,background .15s,border-color .15s;padding-right:1px;}.btn-play.mp4{background:#00BCD4!important;border-color:#00ACC1!important;}.btn-play.mp4 svg polygon{fill:#fff!important;}
.btn-play:hover{transform:scale(1.1);background:#e8e8e8;}
.btn-play svg{width:12px;height:14px;}
.btn-add{height:32px;border-radius:18px;background:#F2F2F2;border:none;color:#0F0F0F;cursor:pointer;display:flex;align-items:center;justify-content:center;flex-shrink:0;font-size:13px;font-weight:500;padding:0 14px;gap:5px;transition:background .15s;white-space:nowrap;}
.btn-add:hover{background:#E5E5E5;}
.btn-add.in-playlist{background:#0F0F0F;color:#fff;}
.btn-yt{width:28px;height:20px;background:#FF0000;border-radius:5px;display:inline-flex;align-items:center;justify-content:center;text-decoration:none;transition:transform .15s,opacity .15s;opacity:.85;flex-shrink:0;}
.btn-yt:hover{opacity:1;transform:scale(1.08);}

/* PLAYLIST SIDE PANEL */
.pl-panel{flex:0 0 0;width:0;min-width:0;overflow:hidden;background:#fff;border-left:none;opacity:0;pointer-events:none;display:flex;flex-direction:column;transition:flex-basis .4s cubic-bezier(0,0,.2,1),width .4s cubic-bezier(0,0,.2,1),opacity .3s cubic-bezier(0,0,.2,1);}
#plPanel:not(.pl-panel){display:none!important;}
.pl-panel.open{flex-basis:338px;width:338px;border-left:1px solid #E5E5E5;opacity:1;pointer-events:auto;}
.pl-panel-hdr{display:flex;align-items:center;padding:8px 12px;border-bottom:1px solid #E5E5E5;gap:6px;flex-shrink:0;background:#fff;}
.pl-panel-title{flex:1;font-size:15px;font-weight:700;}
.pl-panel-close{background:none;border:none;cursor:pointer;font-size:16px;color:#666;width:30px;height:30px;display:flex;align-items:center;justify-content:center;border-radius:50%;}
.pl-panel-close:hover{background:#E5E5E5;}
.pl-panel-body{flex:1;overflow-y:auto;padding:8px 0;background:#fff;}
.pl-item{margin:4px 8px;border-radius:10px;overflow:hidden;border:1px solid transparent;}
.pl-item.dnd-over{border-color:#FF0000;}
.pl-item-hdr{display:flex;align-items:center;gap:10px;padding:10px 12px;cursor:pointer;background:#F2F2F2;}
.pl-item-hdr:hover{background:#E5E5E5;}
.pl-item-icon{width:32px;height:32px;border-radius:50%;background:#888;display:flex;align-items:center;justify-content:center;font-size:14px;color:#fff;flex-shrink:0;}
.pl-item-info{flex:1;min-width:0;}
.pl-item-name{font-weight:700;font-size:14px;color:#0F0F0F;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}
.pl-item-count{font-size:12px;color:#888;margin-top:2px;}
.pl-item-menu-btn{background:none;border:none;cursor:pointer;color:#666;padding:4px 6px;border-radius:6px;font-size:16px;flex-shrink:0;line-height:1;}
.pl-item-menu-btn:hover{background:#E5E5E5;}
.pl-item-chev{font-size:24px;color:#666;transition:transform .2s;flex-shrink:0;line-height:1;}
.pl-item-drag{cursor:grab;color:#bbb;padding:0 5px;flex-shrink:0;display:flex;align-items:center;user-select:none;}
.pl-item-drag:hover{color:#666;}
.pl-item-drag:active{cursor:grabbing;}
.pl-song-drag{cursor:grab;color:#ccc;padding:0 4px;flex-shrink:0;display:flex;align-items:center;user-select:none;}
.pl-song-drag:hover{color:#888;}
.pl-song-drag:active{cursor:grabbing;}
.pl-song-row{display:flex;align-items:center;gap:4px;padding:5px 10px;border-bottom:1px solid #F5F5F5;}
.pl-song-row.dnd-over{background:#EEF2FF;}
.pl-item[data-open="true"] .pl-item-chev{transform:rotate(180deg);}
.pl-item-songs{display:none;background:#F2F2F2;}
.pl-item[data-open="true"] .pl-item-songs{display:block;}
.pl-song-row{display:flex;align-items:center;gap:8px;padding:8px 14px;cursor:pointer;border-top:1px solid #E5E5E5;}
.pl-song-row:hover{background:#E5E5E5;}
.pl-song-info{flex:1;min-width:0;}
.pl-song-name{font-size:14px;font-weight:500;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}
.pl-song-artist{font-size:12px;color:#888;margin-top:1px;}
.pl-song-play{width:30px;height:30px;border-radius:50%;background:#FFFFFF;border:1px solid #E5E5E5;cursor:pointer;display:flex;align-items:center;justify-content:center;flex-shrink:0;padding-right:1px;transition:transform .15s,background .15s,border-color .15s;}
.pl-song-play:hover{transform:scale(1.1);background:#e8e8e8;}
.pl-song-play.mp4{background:#00BCD4;border-color:#00ACC1;}
.pl-song-play.mp4:hover{background:#00ACC1;transform:scale(1.1);}
.pl-song-del{width:22px;height:22px;border-radius:50%;background:none;border:none;cursor:pointer;display:flex;align-items:center;justify-content:center;flex-shrink:0;font-size:13px;color:#aaa;}
.pl-song-del:hover{background:#F2F2F2;color:#e00;}
.pl-song-yt{flex-shrink:0;}
.pl-panel-footer{padding:12px 16px;border-top:1px solid #E5E5E5;flex-shrink:0;background:#fff;}
.pl-create-btn{width:100%;padding:10px;border-radius:10px;background:#fff;border:1px solid #E5E5E5;cursor:pointer;font-size:13px;font-weight:600;font-family:Arial,sans-serif;color:#0F0F0F;}
.pl-create-btn:hover{background:#F2F2F2;}
.pl-ctx-menu{position:fixed;background:#fff;border:1px solid #E5E5E5;border-radius:10px;box-shadow:0 4px 20px rgba(0,0,0,.15);z-index:1000;min-width:140px;overflow:hidden;display:none;}
.pl-ctx-menu.open{display:block;}
.pl-ctx-item{padding:10px 16px;cursor:pointer;font-size:13px;display:flex;align-items:center;gap:8px;}
.pl-ctx-item:hover{background:#F2F2F2;}
.pl-ctx-item.danger{color:#e00;}

/* LAYOUT */
:root{--top-h:120px;--adm-h:0px;}
html,body{height:100%;overflow:hidden;background:#fff;}
.page-body{display:flex;height:calc(100dvh - var(--top-h) - var(--adm-h));overflow:hidden;}
.list-panel{flex:1;min-width:0;overflow-y:auto;height:100%;}
.pl-panel.open{height:100%;}
body.playing .content{max-width:none;margin:0;}

/* PLAYER PANEL */
.player-panel{display:none;flex-direction:column;background:#FFFFFF;min-width:0;}
.panel-header{display:flex;align-items:center;gap:6px;padding:8px 12px;background:#fff;border-bottom:1px solid #ddd;flex-shrink:0;}
.panel-song-info{flex:1;min-width:0;}
.panel-win-btns{flex:1;display:flex;align-items:center;justify-content:flex-end;gap:2px;}
.panel-song-name{font-size:14px;font-weight:700;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;color:#0F0F0F;}
.panel-artist-name{font-size:11px;color:#0F0F0F;margin-top:1px;}
.panel-close{background:none;border:none;color:#333;cursor:pointer;font-size:20px;width:30px;height:30px;display:flex;align-items:center;justify-content:center;border-radius:50%;transition:background .15s,color .15s;flex-shrink:0;}.panel-close:hover{background:#e0e0e0;}
.panel-minimize-btn{background:none;border:none;color:#333;cursor:pointer;font-size:18px;width:30px;height:30px;display:flex;align-items:center;justify-content:center;border-radius:50%;transition:background .15s,color .15s;flex-shrink:0;line-height:1;}
.panel-minimize-btn:hover{background:#e0e0e0;}
.panel-pip-btn{display:none!important;}
.panel-float-btn,.panel-theater-btn{display:none;background:none;border:none;color:#333;cursor:pointer;width:30px;height:30px;align-items:center;justify-content:center;border-radius:50%;transition:background .15s,color .15s;flex-shrink:0;}
.panel-float-btn:hover,.panel-theater-btn:hover{background:#e0e0e0;}
body.theater .panel-theater-btn{color:#FF0000;}
@media(min-width:768px){.panel-float-btn,.panel-theater-btn{display:flex;}}
.panel-video{position:relative;flex:1;min-height:0;background:#000;}
.panel-video iframe{position:absolute;inset:0;width:100%;height:100%;}
.panel-footer{display:none;}.panel-nav-group{display:flex;align-items:center;gap:6px;flex-shrink:0;}
.modal-nav-btn{background:#F2F2F2;border:none;color:#0F0F0F;border-radius:8px;padding:7px 14px;font-size:12px;font-weight:600;cursor:pointer;font-family:Arial,sans-serif;transition:background .15s,color .15s;display:flex;align-items:center;gap:5px;}
.modal-nav-btn:hover{background:#F2F2F2;color:#0F0F0F;}
.modal-nav-btn:disabled{opacity:.35;cursor:default;}
.modal-queue-info{flex:1;text-align:center;font-size:12px;color:#0F0F0F;}
.modal-queue-info b{color:#FF0000;}
.modal-add-btn{height:32px;border-radius:18px;background:#F2F2F2;border:none;color:#0F0F0F;cursor:pointer;display:flex;align-items:center;justify-content:center;flex-shrink:0;font-size:13px;font-weight:500;padding:0 14px;gap:5px;transition:background .15s;white-space:nowrap;font-family:Arial,sans-serif;}
.modal-add-btn:hover{background:#E5E5E5;}
.modal-add-btn.in-queue{background:#0F0F0F;color:#fff;}

/* DESKTOP PLAYING: compact top bar + side-by-side */
@media(min-width:768px){
  body.playing .player-panel{display:flex;height:100%;flex:1 1 0%;}
  body.playing .list-panel{flex:0 0 338px;min-width:0;transition:flex-basis .4s cubic-bezier(0,0,.2,1),opacity .3s cubic-bezier(0,0,.2,1);}
  /* Sliding doors: list collapses as playlist expands — player stays fixed */
  body.playing .page-body:has(.pl-panel.open) .list-panel{flex-basis:0;overflow:hidden;opacity:0;pointer-events:none;}
  body.playing .top{padding:0 24px;}
  /* Compact song list in sidebar */
  body.playing .songs-table td{padding:6px 8px;font-size:13px;}
  body.playing .song-artist-sub{font-size:11px;}
  body.playing .btn-add{height:26px;padding:0 7px;}
  .btn-add{padding:0 10px;}
  body.playing .btn-yt{width:22px;height:16px;}
  body.playing .song-actions{gap:3px;}
  body.playing .btn-play{width:24px;height:24px;}
  body.playing .btn-play svg{width:9px;height:11px;}
  body.playing .artist-header{padding:5px 8px;}
  body.playing .artist-avatar{width:36px;height:36px;font-size:13px;}
  body.playing .artist-name-text{font-size:14px;}
  /* Theater mode: player takes full width */
  body.playing.theater .list-panel{flex-basis:0!important;overflow:hidden;opacity:0;pointer-events:none;}
  body.playing.theater .pl-panel:not(.open){flex-basis:0;width:0;overflow:hidden;}
  body.playing.theater .pl-panel.open{flex-basis:338px;width:338px;}
}

/* MOBILE: overlay + mini bar */
@media(max-width:767px){
  .player-panel{position:fixed;inset:0;z-index:300;flex-direction:column;background:#FFFFFF;border:none;}
  .panel-header{flex-wrap:wrap!important;padding:5px 10px!important;}
  .panel-song-info{flex:1 1 100%!important;min-width:0!important;}
  .panel-song-name{font-size:16px!important;}
  .panel-artist-name{font-size:13px!important;}
  .panel-nav-group{display:flex!important;align-items:center!important;gap:4px!important;}
  .panel-nav-group .modal-queue-info{font-size:11px!important;}
  .modal-nav-btn{font-size:14px!important;}
  .modal-add-btn{font-size:14px!important;}
  .modal-nav-btn{padding:5px 8px!important;gap:3px!important;}
  .player-panel.open{display:flex;}
  body.playing{padding-bottom:70px;}body.has-song{padding-bottom:57px;}
  body.playing .queue-bar{bottom:90px;}

  /* Mobile top bar layout */
  .top-row{flex-direction:column;align-items:stretch;gap:6px;min-height:unset;padding:8px 0 6px;position:sticky;top:0;z-index:200;background:#ffffff;}
  .top-row .yt-search{background:#ffffff!important;border-color:#ccc!important;}
  .brand{position:static;transform:none;display:flex;justify-content:center;}
  .queue-bar{position:static;transform:none;align-self:center;}
  .search-section{width:100%;max-width:100%;flex-wrap:nowrap;gap:8px;}
  /* Hide button text on mobile - icons only */
  .toolbar-btn .btn-label{display:none;}
  .pl-panel.open{flex-basis:73vw;width:73vw;}
  #btnExpandAll,#btnCollapseAll,#btnPlPanel{padding:5px 7px!important;font-size:11px!important;flex-shrink:0;}
  .yt-search{min-width:80px!important;flex:1 1 80px!important;}

  .adm-overlay{align-items:flex-start!important;padding-top:80px!important;}
  body.admin{display:flex!important;flex-direction:column!important;background:#fff!important;overflow:hidden!important;}
  body.admin .page-body{flex:1!important;min-height:0!important;height:auto!important;}
  body.admin.playing .top{display:none!important;}
  body.admin.playing .page-body{flex:none!important;flex-direction:column!important;overflow:hidden!important;min-height:0!important;height:0!important;}
  body.admin.playing .player-panel{display:flex!important;position:static!important;flex:1 1 0!important;min-height:0!important;width:100%!important;inset:auto!important;}
  body.admin.playing .pl-panel{display:none!important;}
  body.admin.playing .list-panel{display:none!important;}
  body.admin.playing .panel-song-info{width:100%!important;-webkit-transform:translateZ(0);transform:translateZ(0);}
  body.admin.playing #admToolbar{overflow-x:scroll!important;-webkit-overflow-scrolling:touch!important;overflow-y:hidden!important;max-height:40px!important;}
  body.admin .page-body{flex:1!important;height:auto!important;min-height:0!important;overflow-y:scroll!important;-webkit-overflow-scrolling:touch!important;padding-bottom:12px!important;}
  .adm-toolbar{display:none;}
  body.admin .adm-toolbar{display:flex!important;position:static!important;flex-shrink:0!important;flex-direction:row!important;flex-wrap:nowrap!important;overflow-x:scroll!important;overflow-y:hidden!important;scroll-snap-type:x mandatory!important;background:#ffffff!important;border-top:1px solid #E5E5E5!important;padding:0!important;gap:0!important;touch-action:pan-x!important;-webkit-overflow-scrolling:touch!important;}
  body.admin .adm-toolbar .atb-add-row{display:flex!important;flex-shrink:0!important;width:100vw!important;box-sizing:border-box!important;padding:4px 8px 4px 8px!important;gap:6px!important;align-items:center!important;scroll-snap-align:start!important;}
  body.admin .adm-toolbar .atb-actions-row{display:flex!important;flex-shrink:0!important;width:100vw!important;box-sizing:border-box!important;padding:4px 8px 4px 8px!important;gap:6px!important;align-items:center!important;scroll-snap-align:start!important;}
  body.admin .adm-toolbar .atb-inp{height:26px!important;flex:1!important;min-width:40px!important;}
  body.admin .adm-toolbar .atb-btn{flex:1!important;min-width:0!important;height:32px!important;box-sizing:border-box!important;justify-content:center!important;padding:2px 6px!important;font-size:11px!important;}
  body.admin .adm-toolbar #atbStat{display:none!important;}
}

/* ── FLOAT PLAYER (PiP) ── */
/* flex column: video on top, drag-bar below — no overlay blocking the iframe */
.float-player{position:fixed;left:0;top:0;width:340px;border-radius:14px;overflow:hidden;box-shadow:0 10px 36px rgba(0,0,0,.18);z-index:9999;display:none;background:#FFFFFF;touch-action:none;user-select:none;}
.float-player.visible{display:flex;flex-direction:column;}
/* Float mode mini-PIP: panel stays in DOM, CSS positions it as a fixed mini window */
@media(min-width:768px){
  body.float-playing .player-panel{display:flex!important;position:fixed!important;right:12px!important;bottom:96px;left:auto!important;width:340px;height:192px;z-index:9998;border-radius:14px 14px 0 0;box-shadow:0 10px 36px rgba(0,0,0,.18);overflow:hidden;flex-direction:column;}
  body.float-playing .panel-header{display:none!important;}
  body.float-playing .panel-footer{display:none!important;}
  body.float-playing .panel-video{flex:1!important;min-height:0!important;}
  body.float-playing #float-video-slot{display:none!important;}
}
.float-player.pip-snap{transition:left .2s cubic-bezier(.25,.46,.45,.94),top .2s cubic-bezier(.25,.46,.45,.94);}
@media(min-width:768px){body.float-playing .player-panel.pip-snap{transition:left .2s cubic-bezier(.25,.46,.45,.94),top .2s cubic-bezier(.25,.46,.45,.94)!important;}}
/* video slot — explicit height, no overlay blocking it */
#float-video-slot{width:100%;height:124px;position:relative;overflow:hidden;background:#000;flex-shrink:0;}
#float-video-slot #yt-player{width:100%!important;height:100%!important;}
#float-video-slot #yt-player iframe{width:100%!important;height:100%!important;display:block!important;}
/* bottom bar — this is the drag handle; video above is fully interactive */
.float-bar{display:flex;align-items:center;background:#FFFFFF;padding:6px 8px 6px 12px;gap:4px;cursor:grab;touch-action:none;flex-shrink:0;border-top:1px solid #E5E5E5;}
.float-bar.grabbing{cursor:grabbing;}
.float-bar-song{flex:1;font-size:13px;color:#bbb;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;direction:rtl;min-width:0;pointer-events:none;line-height:1.3;}
.fbar-btn{background:none;border:none;color:#888;cursor:pointer;font-size:15px;width:34px;height:34px;display:flex;align-items:center;justify-content:center;border-radius:50%;transition:color .12s,background .12s;flex-shrink:0;}
.fbar-btn:hover,.fbar-btn:active{color:#0F0F0F;background:rgba(0,0,0,.12);}
#pipPlayBtn{font-size:20px;color:#ddd;}
body.float-playing .mini-bar{display:none!important;}
@media(max-width:767px){
  .float-player{width:185px;}
  #float-video-slot{height:104px;}
  body.float-playing{padding-bottom:16px;}
  .float-bar{padding:4px 5px 4px 8px;gap:2px;}
  .float-bar-song{font-size:10px;}
  .fbar-btn{width:26px;height:26px;font-size:12px;}
  #pipPlayBtn{font-size:15px;}
}

.atb-add-row,.atb-actions-row{display:contents;}
/* MINI BAR */
.mini-bar{display:none;position:fixed;bottom:0;left:0;right:0;background:#fff;border-top:1px solid #E5E5E5;border-radius:12px 12px 0 0;padding:6px 14px 10px;z-index:200;align-items:center;gap:10px;cursor:pointer;box-shadow:0 -4px 16px rgba(0,0,0,.1);}

/* Floating mini fab — appears bottom-right when minimizing from playlist mode */
.mini-fab{display:none;position:fixed;bottom:20px;right:20px;z-index:300;background:#fff;border:1px solid #E5E5E5;border-radius:40px;box-shadow:0 4px 20px rgba(0,0,0,.15);padding:6px 16px 6px 8px;align-items:center;gap:10px;cursor:pointer;width:240px;transition:box-shadow .15s;}

.mini-fab.visible{display:flex;}
.mini-fab-thumb{width:34px;height:34px;border-radius:50%;background:#eee center/cover no-repeat;flex-shrink:0;}
.mini-fab-info{flex:1;min-width:0;}
.mini-fab-song{font-size:12px;font-weight:700;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;color:#0F0F0F;}

.mini-fab-close{background:none;border:none;color:#aaa;cursor:pointer;font-size:14px;width:24px;height:24px;display:flex;align-items:center;justify-content:center;border-radius:50%;flex-shrink:0;transition:background .15s;padding:0;}
.mini-fab-close:hover{background:#F2F2F2;color:#333;}

/* QUEUE BAR */
.queue-bar{position:absolute;left:12px;top:50%;transform:translateY(-50%);z-index:200;background:#FF0000;border-radius:500px;padding:7px 16px;display:flex;align-items:center;gap:8px;box-shadow:0 4px 12px rgba(0,0,0,.4);transition:opacity .3s;opacity:0;pointer-events:none;white-space:nowrap;}

.queue-bar-text{font-size:13px;font-weight:700;color:#000;}

.queue-clear-btn{background:none;border:none;color:rgba(0,0,0,.6);cursor:pointer;font-size:18px;line-height:1;padding:0 0 0 4px;}

mark{background:rgba(29,185,84,.2);color:#FF0000;border-radius:3px;padding:0 2px;font-weight:700;}
.no-results{text-align:center;padding:60px 20px;color:#0F0F0F;font-size:15px;}

/* QUEUE PANEL */
.queue-panel{position:fixed;bottom:0;left:0;right:0;max-height:65vh;overflow-y:auto;background:#FFFFFF;border-top:2px solid #FF0000;border-radius:20px 20px 0 0;z-index:600;transform:translateY(110%);transition:transform .35s cubic-bezier(.4,0,.2,1);}

.q-clear-btn{background:#0F0F0F;border:none;color:#0F0F0F;border-radius:8px;padding:7px 12px;font-size:12px;cursor:pointer;font-family:Arial,sans-serif;}
.q-close-btn{background:none;border:none;color:#888;cursor:pointer;font-size:22px;width:32px;height:32px;display:flex;align-items:center;justify-content:center;border-radius:50%;}

.queue-item{display:flex;align-items:center;padding:10px 20px;gap:12px;border-bottom:1px solid rgba(255,255,255,.04);transition:background .1s;cursor:pointer;}

.qi-name{font-size:13px;color:#0F0F0F;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}
.qi-artist{font-size:11px;color:#0F0F0F;margin-top:2px;}
.qi-rm{background:none;border:none;color:#909090;cursor:pointer;font-size:18px;width:30px;height:30px;display:flex;align-items:center;justify-content:center;border-radius:50%;transition:all .15s;flex-shrink:0;}

.queue-overlay{position:fixed;inset:0;background:rgba(0,0,0,.6);z-index:599;display:none;}

/* ── ADMIN MODE ── */
.admin-lock{background:none;border:none;color:#606060;cursor:pointer;font-size:17px;width:32px;height:32px;display:flex;align-items:center;justify-content:center;border-radius:50%;transition:all .15s;flex-shrink:0;padding:0;}

/* Drag handles */
.drag-handle{cursor:grab;color:#606060;font-size:15px;padding:2px 6px;user-select:none;display:none;line-height:1;flex-shrink:0;transition:color .15s;}

let queue=[], ytPlayer=null, playerReady=false, _pipWin=null;

function onYouTubeIframeAPIReady(){
  ytPlayer=new YT.Player('yt-player',{
    width:'100%',height:'100%',
    playerVars:{autoplay:1,rel:0,modestbranding:1},
    events:{
      onReady:()=>{playerReady=true;const ifr=document.querySelector('#yt-player iframe');if(ifr){const a=ifr.getAttribute('allow')||'';if(!a.includes('autoplay'))ifr.setAttribute('allow',a+';autoplay;picture-in-picture');}},
      onStateChange:(e)=>{
        if(e.data===YT.PlayerState.ENDED)modalNav(1);
        const playing=e.data===YT.PlayerState.PLAYING;
        const b=document.getElementById('miniPlayBtn');if(b)b.textContent=playing?'⏸':'▶';
        const pb=document.getElementById('pipPlayBtn');if(pb)pb.textContent=playing?'⏸':'▶';
        if('mediaSession' in navigator)navigator.mediaSession.playbackState=playing?'playing':(e.data===YT.PlayerState.PAUSED?'paused':'none');
      },
      onError:(e)=>{
        // YouTube error codes: 2=invalid ID, 5=HTML5 error, 100=not found, 101/150=embed not allowed
        console.warn('YouTube player error:',e.data);
        if(e.data===101||e.data===150){
          const vid=currentSong?currentSong.v:null;
          if(vid){window.open('https://www.youtube.com/watch?v='+vid,'_blank');}
          _atbStat('▶ נפתח ביוטיוב','ok');
        }else if(e.data===100){
          setTimeout(()=>{ if(currentSongIdx<currentSongList.length-1)modalNav(1); },2000);
        }
      }
    }
  });
}

function addToQueue(song){
  if(queue.some(s=>s.v===song.v))return;
  queue.push(song);
  updateQueueBar();
  refreshAddBtns();
}
function removeFromQueue(vid){
  queue=queue.filter(s=>(s.v||s.mp4)!==vid);
  updateQueueBar();
  refreshAddBtns();
}
function clearQueue(){queue=[];updateQueueBar();refreshAddBtns();}
function isInQueue(vid){return queue.some(s=>s.v===vid);}

function updateQueueBar(){
  const bar=document.getElementById('queueBar');
  bar.className='queue-bar'+(queue.length>0?' visible':'');
  document.getElementById('queueBarText').textContent=`${queue.length} ${queue.length===1?'שיר':'שירים'} בפלייליסט`;

function setupMediaSession(song){
  if(!('mediaSession' in navigator))return;
  navigator.mediaSession.metadata=new MediaMetadata({
    title:song.s,
    artist:song.a||'',
    album:'שירים אהובים',
    artwork:[
      {src:`https://i.ytimg.com/vi/${song.v}/mqdefault.jpg`,sizes:'320x180',type:'image/jpeg'},
      {src:`https://i.ytimg.com/vi/${song.v}/maxresdefault.jpg`,sizes:'1280x720',type:'image/jpeg'}
    ]
  });
  navigator.mediaSession.setActionHandler('play',()=>{if(ytPlayer&&playerReady)ytPlayer.playVideo();});
  navigator.mediaSession.setActionHandler('pause',()=>{if(ytPlayer&&playerReady)ytPlayer.pauseVideo();});
  navigator.mediaSession.setActionHandler('nexttrack',()=>modalNav(1));
  navigator.mediaSession.setActionHandler('previoustrack',()=>modalNav(-1));
  try{navigator.mediaSession.setActionHandler('seekto',(d)=>{if(ytPlayer&&playerReady&&d.seekTime!=null)ytPlayer.seekTo(d.seekTime,true);});}catch(e){}
  try{navigator.mediaSession.setActionHandler('seekbackward',(d)=>{if(ytPlayer&&playerReady)ytPlayer.seekTo(Math.max(0,(ytPlayer.getCurrentTime()||-0)-(d.seekOffset||10)),true);});}catch(e){}
  try{navigator.mediaSession.setActionHandler('seekforward',(d)=>{if(ytPlayer&&playerReady)ytPlayer.seekTo((ytPlayer.getCurrentTime()||0)+(d.seekOffset||10),true);});}catch(e){}
}

function openModal(song,songList,idx,startSeconds){
  // Close Document PiP first so player iframe is back in main doc
  if(_pipWin){try{_pipWin.close();}catch(e){}_pipWin=null;}
  // If the same song is already playing/buffering in the float player, just restore panel — don't restart
  if(!song.mp4&&song.v===currentSong?.v&&document.body.classList.contains('float-playing')&&ytPlayer&&playerReady){
    hideFloatPlayer();
    document.getElementById('panelSong').textContent=song.s;
    document.getElementById('panelArtist').textContent=song.a;
    document.body.classList.add('playing');
    document.body.classList.add('has-song');
    if(window.innerWidth>=768){window.scrollTo(0,0);}
    if(window.innerWidth<768){document.getElementById('playerPanel').classList.add('open');document.body.style.overflow='hidden';}
    requestAnimationFrame(setTopH);
    updateModalNav();
    updateModalAddBtn();
    // No DOM move happened — iframe never left panel-slot — just ensure video is playing
    const st=ytPlayer.getPlayerState();
    if(st!==YT.PlayerState.PLAYING&&st!==YT.PlayerState.BUFFERING)ytPlayer.playVideo();
    return;
  }
  hideFloatPlayer();
  currentSong=song;currentSongList=songList;currentSongIdx=idx;
  document.getElementById('panelSong').textContent=song.s;
  document.getElementById('panelArtist').textContent=song.a;
  document.getElementById('miniSong').textContent=song.s;
  document.getElementById('miniArtist').textContent=song.a;
  if(song.mp4){document.getElementById('miniThumb').style.backgroundImage='none';}else{document.getElementById('miniThumb').style.backgroundImage=`url('https://i.ytimg.com/vi/${song.v}/mqdefault.jpg')`;}
  // Open panel FIRST so iframe is visible before seeking/playing
  document.body.classList.add('playing');
  document.body.classList.add('has-song');
  if(window.innerWidth<768){document.getElementById('playerPanel').classList.add('open');}
  if(window.innerWidth>=768){window.scrollTo(0,0);}
  if(window.innerWidth<768){document.getElementById('playerPanel').classList.add('open');document.body.style.overflow='hidden';}
  requestAnimationFrame(setTopH);
  const start=startSeconds||0;
  function _loadOrSeek(vid,sec){
    let curVid=null;try{curVid=ytPlayer.getVideoData()?.video_id;}catch(e){}
    const st=ytPlayer.getPlayerState();
    // Only seek+play when video is genuinely paused — all other states use loadVideoById for reliability
    if(curVid===vid&&st===YT.PlayerState.PAUSED){
      ytPlayer.seekTo(sec,true);ytPlayer.playVideo();
    }else{
      ytPlayer.loadVideoById({videoId:vid,startSeconds:sec});
    }
  }
  if(song.mp4){if(ytPlayer&&playerReady)ytPlayer.pauseVideo();var _m=document.getElementById('mp4Player');document.getElementById('yt-player').style.display='none';_m.style.display='block';_m.src=song.mp4;_m.currentTime=start;_m.play().catch(()=>{});}else{document.getElementById('yt-player').style.display='';var _m2=document.getElementById('mp4Player');if(_m2){_m2.style.display='none';_m2.pause();_m2.src='';}if(ytPlayer&&playerReady)_loadOrSeek(song.v,start);else setTimeout(()=>{if(ytPlayer&&playerReady)_loadOrSeek(song.v,start);},500);}
  document.getElementById('miniPlayBtn').textContent='⏸';
  updateModalNav();
  updateModalAddBtn();
  saveSession(song);
  setupMediaSession(song);
}

async function mobilePiP(){
  document.getElementById('playerPanel').classList.remove('open');
  document.body.classList.remove('playing');
  document.body.style.overflow='';
  if(!currentSong)return;
  // Try native Document Picture-in-Picture (Chrome 116+ desktop / Edge 116+)
  if('documentPictureInPicture' in window){
    try{
      const ytEl=document.getElementById('yt-player');
      const pipWin=await documentPictureInPicture.requestWindow({width:320,height:212});
      _pipWin=pipWin;
      const st=pipWin.document.createElement('style');
      st.textContent='*{box-sizing:border-box;margin:0;padding:0}body{background:#000;font-family:Arial,sans-serif;overflow:hidden}'+
        '#yt-player,#yt-player iframe{width:320px!important;height:180px!important;display:block!important;}'+
        '.pb{display:flex;align-items:center;background:#181818;padding:5px 8px;gap:5px;border-top:1px solid #2a2a2a;}'+
        '.pt{flex:1;font-size:11px;color:#bbb;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;direction:rtl;}'+
        '.pa{background:none;border:none;color:#aaa;font-size:14px;cursor:pointer;width:28px;height:28px;border-radius:50%;display:flex;align-items:center;justify-content:center;}'+
        '.pa:hover{background:#333;color:#fff;}';
      pipWin.document.head.appendChild(st);
      // Force iframe dimensions (no position:static — that breaks YouTube rendering)
      const ifr=ytEl.querySelector('iframe');
      if(ifr)ifr.style.cssText='width:320px!important;height:180px!important;display:block!important;';
      // Build toolbar
      const bar=pipWin.document.createElement('div');bar.className='pb';
      const titleEl=pipWin.document.createElement('div');titleEl.className='pt';
      titleEl.textContent=currentSong.s+(currentSong.a?' – '+currentSong.a:'');
      const playBtn=pipWin.document.createElement('button');playBtn.className='pa';playBtn.textContent='⏸';
      playBtn.addEventListener('click',()=>{
        if(!ytPlayer||!playerReady)return;
        const pl=ytPlayer.getPlayerState()===YT.PlayerState.PLAYING;
        pl?ytPlayer.pauseVideo():ytPlayer.playVideo();
        playBtn.textContent=pl?'▶':'⏸';
      });
      const expBtn=pipWin.document.createElement('button');expBtn.className='pa';expBtn.title='פתח';expBtn.textContent='⛶';
      expBtn.addEventListener('click',()=>{
        pipWin.close(); // pagehide handler moves player back
        setTimeout(()=>{
          document.getElementById('playerPanel').classList.add('open');
          document.body.classList.add('playing');
          document.body.style.overflow='hidden';
          requestAnimationFrame(setTopH);
        },60);
      });
      bar.append(titleEl,playBtn,expBtn);
      pipWin.document.body.append(ytEl,bar);
      document.body.classList.add('float-playing');
      // On close: restore player to main panel
      pipWin.addEventListener('pagehide',()=>{
        _pipWin=null;
        if(ifr)ifr.style.cssText='';
        const slot=document.getElementById('panel-video-slot');
        if(ytEl.parentNode!==slot)slot.appendChild(ytEl);
        document.body.classList.remove('float-playing');
      });
      return;
    }catch(e){console.log('Document PiP not available:',e);}
  }
  // Fallback: custom draggable float player
  showFloatPlayer();
}

function _snapToCorner(fp){
  const vw=window.innerWidth,vh=window.innerHeight;
  const r=fp.getBoundingClientRect();
  const m=12, bm=window.innerWidth<768?76:80;
  const isDesk=window.innerWidth>=768&&document.body.classList.contains('float-playing');
  const panel=isDesk?document.getElementById('playerPanel'):null;
  const ph=panel?panel.offsetHeight:192;
  // Use combined bounding box (panel+bar) to decide corner on desktop
  const refTop=isDesk&&panel?panel.getBoundingClientRect().top:r.top;
  const refH=isDesk?ph+r.height:r.height;
  const goLeft=(isDesk&&panel?panel.getBoundingClientRect().left:r.left)+r.width/2<vw/2;
  const goTop=refTop+refH/2<vh/2;
  fp.classList.add('pip-snap');
  if(isDesk&&panel){
    const nx=goLeft?m:vw-340-m;
    const ny=goTop?m:vh-ph-r.height-bm;
    panel.classList.add('pip-snap');
    panel.style.setProperty('left',nx+'px','important');
    panel.style.setProperty('top',ny+'px','important');
    panel.style.setProperty('right','auto','important');
    panel.style.setProperty('bottom','auto','important');
    fp.style.left=nx+'px';
    fp.style.top=(ny+ph)+'px';
    setTimeout(()=>{fp.classList.remove('pip-snap');panel.classList.remove('pip-snap');},280);
  }else{
    fp.style.left=(goLeft?m:vw-r.width-m)+'px';
    fp.style.top=(goTop?m:vh-r.height-bm)+'px';
    fp.style.right='auto'; fp.style.bottom='auto';
    setTimeout(()=>fp.classList.remove('pip-snap'),280);
  }
}

function initPiP(){
  const fp=document.getElementById('floatPlayer');
  const bar=document.getElementById('floatBar');
  if(!fp||!bar)return;

  function _isDesk(){return window.innerWidth>=768&&document.body.classList.contains('float-playing');}
  function _getPanel(){return document.getElementById('playerPanel');}
  // Move the CSS mini-pip panel to an explicit left/top position (overrides CSS right/bottom)
  function _setPanelPos(x,y){
    const panel=_getPanel();
    if(!panel)return;
    panel.style.setProperty('left',x+'px','important');
    panel.style.setProperty('top',y+'px','important');
    panel.style.setProperty('right','auto','important');
    panel.style.setProperty('bottom','auto','important');
  }
  // Get the top-left of the combined unit (panel top-left on desktop, fp top-left on mobile)
  function _getAnchorRect(){
    if(_isDesk()){const panel=_getPanel();if(panel)return panel.getBoundingClientRect();}
    return fp.getBoundingClientRect();
  }

  // ── TOUCH drag via bottom bar ──
  bar.addEventListener('touchstart',e=>{
    if(e.target.closest('.fbar-btn'))return;
    _pipDrag=true;_pipMoved=false;
    const t=e.touches[0];
    _pipSX=t.clientX;_pipSY=t.clientY;
    const ar=_getAnchorRect();
    _pipOX=t.clientX-ar.left;_pipOY=t.clientY-ar.top;
    // Lock current fp position before dragging
    const fr=fp.getBoundingClientRect();
    fp.style.left=fr.left+'px';fp.style.top=fr.top+'px';
    fp.style.right='auto';
    fp.classList.remove('pip-snap');
    bar.classList.add('grabbing');
  },{passive:true});

  document.addEventListener('touchmove',e=>{
    if(!_pipDrag)return;
    e.preventDefault();
    const t=e.touches[0];
    if(Math.abs(t.clientX-_pipSX)>5||Math.abs(t.clientY-_pipSY)>5)_pipMoved=true;
    const x=t.clientX-_pipOX, y=t.clientY-_pipOY;
    if(_isDesk()){
      _setPanelPos(x,y);
      const ph=(_getPanel()||{offsetHeight:192}).offsetHeight;
      fp.style.left=x+'px';fp.style.top=(y+ph)+'px';
    }else{
      fp.style.left=x+'px';fp.style.top=y+'px';
    }
  },{passive:false});

  document.addEventListener('touchend',()=>{
    if(!_pipDrag)return;
    _pipDrag=false;
    bar.classList.remove('grabbing');
    if(!_pipMoved)return;
    const r=fp.getBoundingClientRect();
    if(r.right<-20||r.left>window.innerWidth+20){closeFloat();return;}
    _snapToCorner(fp);
  });

  // ── MOUSE drag via bottom bar (desktop) ──
  bar.addEventListener('mousedown',e=>{
    if(e.target.closest('.fbar-btn'))return;
    _pipDrag=true;_pipMoved=false;
    _pipSX=e.clientX;_pipSY=e.clientY;
    const ar=_getAnchorRect();
    _pipOX=e.clientX-ar.left;_pipOY=e.clientY-ar.top;
    const fr=fp.getBoundingClientRect();
    fp.style.left=fr.left+'px';fp.style.top=fr.top+'px';
    fp.style.right='auto';
    fp.classList.remove('pip-snap');
    bar.classList.add('grabbing');
    e.preventDefault();
  });
  document.addEventListener('mousemove',e=>{
    if(!_pipDrag)return;
    if(Math.abs(e.clientX-_pipSX)>4)_pipMoved=true;
    const x=e.clientX-_pipOX, y=e.clientY-_pipOY;
    if(_isDesk()){
      _setPanelPos(x,y);
      const ph=(_getPanel()||{offsetHeight:192}).offsetHeight;
      fp.style.left=x+'px';fp.style.top=(y+ph)+'px';
    }else{
      fp.style.left=x+'px';fp.style.top=y+'px';
    }
  });
  document.addEventListener('mouseup',()=>{
    if(!_pipDrag)return;
    _pipDrag=false;
    bar.classList.remove('grabbing');
    if(_pipMoved)_snapToCorner(fp);
  });
}

async function fetchArtistImg(name){
  // 1. Wikipedia Hebrew
  try{const r=await fetch(`https://he.wikipedia.org/api/rest_v1/page/summary/${encodeURIComponent(name.replace(/ /g,'_'))}`);
    if(r.ok){const d=await r.json();if(d.thumbnail?.source)return d.thumbnail.source;}
  }catch(e){}
  // 2. iTunes — search by song (artworkUrl100 only exists on song/album results)
  try{const r=await fetch(`https://itunes.apple.com/search?term=${encodeURIComponent(name)}&entity=song&limit=5&country=IL`);
    if(r.ok){const d=await r.json();
      for(const s of(d.results||[])){
        // make sure it's the right artist
        if(s.artworkUrl100&&s.artistName&&s.artistName.toLowerCase().includes(name.slice(0,3).toLowerCase())){
          return s.artworkUrl100.replace('100x100bb','600x600bb');
        }
      }
      // fallback: first result regardless
      if(d.results?.[0]?.artworkUrl100)return d.results[0].artworkUrl100.replace('100x100bb','600x600bb');
    }
  }catch(e){}
  return null;
}

async function loadImages(){

    if(CUSTOM_PHOTOS[name]){applyPhoto(el,CUSTOM_PHOTOS[name]);IMG_CACHE[name]=CUSTOM_PHOTOS[name];continue;}
  const customPhoto=localStorage.getItem('artist_photo_'+name);
    if(customPhoto){applyPhoto(el,customPhoto);IMG_CACHE[name]=customPhoto;continue;}
    if(IMG_CACHE[name]&&IMG_CACHE[name]!=='none'){applyPhoto(el,IMG_CACHE[name]);continue;}
    if(IMG_CACHE[name]==='none')continue;
    promises.push((async()=>{

}

  if(st){
    hideFab();

    document.body.classList.add('playing');
    if(st.theater)document.body.classList.add('theater');

    return;
  }
  // Mini bar from float/close — player still loaded
  if(ytPlayer&&playerReady&&ytPlayer.getPlayerState()!==YT.PlayerState.UNSTARTED){
    document.getElementById('playerPanel').classList.add('open');
    document.body.classList.add('playing');
    document.body.style.overflow='hidden';
    requestAnimationFrame(setTopH);
    return;
  }
  // Page was reloaded — restore from session
  const saved=JSON.parse(localStorage.getItem(SESSION_KEY)||'null');
  if(saved&&saved.list){
    const songList2=ALL.filter(s=>saved.list.includes(s.v));
    const idx=Math.max(0,saved.list.indexOf(currentSong.v));

  const b=await crypto.subtle.digest('SHA-256',new TextEncoder().encode(s));

function _rebuildFromGroups(ord,groups){ALL.length=0;ord.forEach(a=>groups[a].forEach(s=>ALL.push(s)));}

function adminRenameArtist(vid){

function adminDeleteSong(vid){

  if(!confirm('למחוק "'+song.s+'" של '+song.a+'?'))return;
  ALL.splice(ALL.findIndex(s=>(s.v||s.mp4)===vid),1);
  if(isInQueue(vid))removeFromQueue(vid);
  render(document.getElementById("q").value||"");
  _markDirty();_atbStat("🗑 שיר נמחק","ok");
  adminSyncGitHub();
}
function adminAddSong(){
  let artist=document.getElementById("atbArtist").value.trim();
  if(artist==='__new__'){
    const n=prompt('שם האמן / תיקייה החדשה:','');
    if(!n||!n.trim()){return;}
    artist=n.trim();
  }
  const song=document.getElementById("atbSong").value.trim();
  const url=document.getElementById("atbUrl").value.trim();
  if(!artist||!song){_atbStat("חסר שם אמן או שם שיר","err");return;}
  let entry;
  if(url.match(/\.mp4/i)||url.includes('.r2.dev')){
    if(ALL.some(s=>s.mp4===url)){_atbStat('שיר זה כבר קיים ברשימה','err');return;}
    entry={a:artist,s:song,mp4:url};
  }else{
  const m=url.match(/[?&]v=([A-Za-z0-9_-]+)/);
  if(!m){_atbStat("קישור יוטיוב לא תקין","err");return;}
  const vid=m[1];
  if(ALL.some(s=>s.v===vid)){_atbStat("שיר זה כבר קיים ברשימה","err");return;}
    entry={a:artist,s:song,v:vid};
  }
  const lastIdx=ALL.reduce((li,s,i)=>s.a===artist?i:li,-1);
  if(lastIdx>=0){
    ALL.splice(lastIdx+1,0,entry);
  }else{
    ALL.push(entry);
    const grp={};const ord2=[];
    ALL.forEach(s=>{if(!grp[s.a]){grp[s.a]=[];ord2.push(s.a);}grp[s.a].push(s);});
    ord2.sort((a,b)=>a<b?-1:a>b?1:0);
    ALL.length=0;ord2.forEach(a=>grp[a].forEach(s=>ALL.push(s)));
  }
  document.getElementById("atbSong").value="";
  document.getElementById("atbUrl").value="";
  _fillArtistList();
  document.getElementById("atbArtist").value="";
  document.getElementById("atbSong").focus();
  render(document.getElementById("q").value||"");
  _markDirty();_atbStat("✓ שיר נוסף","ok");
  adminSyncGitHub();
}
function adminSetPhoto(artist){
  const cur=CUSTOM_PHOTOS[artist]||localStorage.getItem('artist_photo_'+artist)||'';
  const url=prompt('כתובת תמונה לאמן "'+artist+'":\n(ריק = מחיקה)',cur);
  if(url===null)return;
  if(url.trim()){CUSTOM_PHOTOS[artist]=url.trim();localStorage.setItem('artist_photo_'+artist,url.trim());}
  else{delete CUSTOM_PHOTOS[artist];localStorage.removeItem('artist_photo_'+artist);}
  delete IMG_CACHE[artist];
  const _os={};document.querySelectorAll('.artist-block[data-vid]').forEach(b=>{_os[b.dataset.vid]=b.dataset.open;});
  render(document.getElementById('q').value||'');
  document.querySelectorAll('.artist-block[data-vid]').forEach(b=>{if(_os[b.dataset.vid])b.dataset.open=_os[b.dataset.vid];});
  _markDirty();_atbStat('🖼️ תמונה עודכנה','ok');
}
function _markDirty(){
  _admDirty=true;
  const b=document.getElementById("atbSyncBtn");
  if(b){b.style.outline="2px solid #f0a500";b.title="יש שינויים שלא נשמרו";}
}
function _atbStat(msg,cls){
  clearTimeout(_atbT);const el=document.getElementById("atbStat");if(!el)return;
  el.textContent=msg;el.className="atb-stat"+(cls?" "+cls:"");
  _atbT=setTimeout(()=>{el.textContent="";el.className="atb-stat";},4500);
}
async function adminSyncGitHub(){
  const token=localStorage.getItem("gh_token");
  if(!token){document.getElementById("admTokenOv").classList.add("open");return;}
  const btn=document.getElementById("atbSyncBtn")||{textContent:"",disabled:false,style:{outline:""},title:""};
  btn.textContent="מסנכרן...";btn.disabled=true;
  try{
    const r=await fetch("https://api.github.com/repos/israelladani-cyber/shirim-ahuvim/contents/index.html",
      {headers:{"Authorization":"Bearer "+token,"Accept":"application/vnd.github.v3+json"}});
    if(!r.ok)throw new Error("GitHub API שגיאה: "+r.status);
    const d=await r.json();
    const raw=decodeURIComponent(escape(atob(d.content.replace(/\n/g,""))));
    const newAll="const ALL="+JSON.stringify(ALL)+";";
    let newHtml=raw.replace(/const ALL=\[[\s\S]*?\];/,newAll);
    for(const [n,u] of Object.entries(IMG_CACHE||{})){if(u&&u!=="none"&&!CUSTOM_PHOTOS[n])CUSTOM_PHOTOS[n]=u;}
      // Merge localStorage: upload data URLs to GitHub, get real download_url
      for(let _i=0;_i<localStorage.length;_i++){
        const _k=localStorage.key(_i);if(!_k.startsWith('artist_photo_'))continue;
        const _n=_k.replace('artist_photo_',''),_u=localStorage.getItem(_k);
        if(_u&&_u.startsWith('data:')){
          const _ext=_u.startsWith('data:image/webp')?'webp':'jpg',_b64=_u.split(',')[1];
          const _chk=await fetch('https://api.github.com/repos/israelladani-cyber/shirim-ahuvim/contents/photos/'+encodeURIComponent(_n+'.'+_ext),{headers:{'Authorization':'Bearer '+token}});
          const _cj=await _chk.json();const _pb={message:'תמונת '+_n,content:_b64};if(_cj.sha)_pb.sha=_cj.sha;
          const _pr=await fetch('https://api.github.com/repos/israelladani-cyber/shirim-ahuvim/contents/photos/'+encodeURIComponent(_n+'.'+_ext),{method:'PUT',headers:{'Authorization':'Bearer '+token,'Content-Type':'application/json'},body:JSON.stringify(_pb)});
          const _pj=await _pr.json();
          if(_pj.content&&_pj.content.download_url){CUSTOM_PHOTOS[_n]=_pj.content.download_url;localStorage.setItem('artist_photo_'+_n,_pj.content.download_url);}
        }else if(_u&&_u.startsWith('http')){CUSTOM_PHOTOS[_n]=_u;}
      }
    const newCustomPhotos="const CUSTOM_PHOTOS="+JSON.stringify(CUSTOM_PHOTOS)+";";
    newHtml=newHtml.replace(/const CUSTOM_PHOTOS=\{[\s\S]*?\};/,newCustomPhotos);
    if(newHtml===raw)throw new Error("לא ניתן לאתר את מערך השירים בקובץ");
    const enc=btoa(unescape(encodeURIComponent(newHtml)));
    const put=await fetch("https://api.github.com/repos/israelladani-cyber/shirim-ahuvim/contents/index.html",{
      method:"PUT",
      headers:{"Authorization":"Bearer "+token,"Content-Type":"application/json"},
      body:JSON.stringify({message:"עדכון שירים דרך פאנל ניהול",content:enc,sha:d.sha})
    });
    if(!put.ok){const e=await put.json();throw new Error(e.message||"שגיאה "+put.status);}
    _admDirty=false;
    btn.style.outline="none";btn.title="";
    btn.textContent="✓ נשמר!";
    setTimeout(()=>btn.textContent="⟳ שמור ב-GitHub",3000);
    _atbStat("✓ עודכן ב-GitHub בהצלחה","ok");
  document.getElementById("atbArtist").value="";
  document.getElementById("atbSong").value="";
  document.getElementById("atbUrl").value="";
  }catch(e){
    _atbStat("שגיאה: "+e.message,"err");
    btn.textContent="⟳ שמור ב-GitHub";
  }finally{btn.disabled=false;}
}
</script>

<div id="plPickerOverlay"><div class="pl-picker-bg" onclick="closePlPicker()"></div><div id="plPicker"><div class="pl-picker-title">הוסף לפלייליסט</div><div id="plPickerList"></div><div class="pl-pick-sep"></div><div class="pl-pick-new" onclick="plNewFromPicker()"><span>+</span> פלייליסט חדש</div></div></div><div id="plPanel"><div id="plListView" style="display:flex;flex-direction:column;height:100%;"><div class="pl-ph"><button class="pl-ph-back" onclick="closePlPanel()">✕</button><div class="pl-ph-title">הפלייליסטים שלי</div></div><div class="pl-body" id="plList"></div></div><div id="plDetailView" style="display:none;flex-direction:column;height:100%;"><div class="pl-ph"><button class="pl-ph-back" onclick="plBackToList()">←</button><div class="pl-ph-title" id="plDetailName"></div><div class="pl-ph-actions"><button class="pl-btn pri" onclick="plPlayAll()">▶ נגן הכל</button><button class="pl-btn" onclick="plRename()">שנה שם</button><button class="pl-btn" style="color:#f88;" onclick="plDelete()">🗑️</button></div></div><div class="pl-body" id="plDetailSongs"></div></div></div><script>
function _plLoad(){try{return JSON.parse(localStorage.getItem('kpl')||'[]');}catch(e){return[];}}
function _plSave(l){localStorage.setItem('kpl',JSON.stringify(l));}
function _plId(){return Date.now().toString(36)+Math.random().toString(36).slice(2,7);}
window._plSong=null;
function openPlPicker(song){
  window._plSong=song;
  var pls=_plLoad(),sid=song?(song.v||song.mp4):null,inQ=sid?isInQueue(sid):false;
  var html='<div class="pl-pick-item'+(inQ?' checked':'')+'" onclick="plPickQueue()"><span class="pl-pick-check">'+(inQ?'\u2713':'')+'<\/span>▶ פלייליסט זמני<\/div>';
  if(pls.length)html+='<div class="pl-pick-sep"><\/div>';
  pls.forEach(function(pl){
    var has=sid?pl.songs.some(function(s){return(s.v||s.mp4)===sid;}):false;
    html+='<div class="pl-pick-item'+(has?' checked':'')+'" onclick="plPickAdd(\''+pl.id+'\')">'
      +'<span class="pl-pick-check">'+(has?'\u2713':'')+'<\/span>'+pl.name+'<\/div>';
  });
  document.getElementById('plPickerList').innerHTML=html;
  document.getElementById('plPickerOverlay').classList.add('open');
}
function closePlPicker(){document.getElementById('plPickerOverlay').classList.remove('open');}
function plPickQueue(){var song=window._plSong;if(song)toggleAddSong(song.v||song.mp4);closePlPicker();var _qEl=document.getElementById('queuePanel');if(_qEl&&_qEl.classList.contains('open'))openQueuePanel();}
function plPickAdd(plId){
  var song=window._plSong;if(!song)return;
  var pls=_plLoad(),pl=pls.find(function(p){return p.id===plId;});if(!pl)return;
  var sid=song.v||song.mp4,idx=pl.songs.findIndex(function(s){return(s.v||s.mp4)===sid;});
  if(idx>=0)pl.songs.splice(idx,1);else pl.songs.push(song);
  _plSave(pls);closePlPicker();
  if(document.getElementById('plPanel').classList.contains('open'))_plRenderList();
}
function plNewFromPicker(){
  var name=prompt('שם הפלייליסט:','');if(!name||!name.trim())return;
  var pls=_plLoad(),song=window._plSong;
  pls.push({id:_plId(),name:name.trim(),songs:song?[song]:[],created:Date.now()});
  _plSave(pls);closePlPicker();
  if(document.getElementById('plPanel').classList.contains('open'))_plRenderList();
}
// openPlPanel / closePlPanel defined below
function plBackToList(){document.getElementById('plDetailView').style.display='none';document.getElementById('plListView').style.display='flex';}
function _plRenderList(){
  var pls=_plLoad(),c=document.getElementById('plList');
  var qn=(typeof queue!=='undefined'?queue.length:0);
  var html='<div class="pl-list-item" onclick="closePlPanel();openQueuePanel()"><div class="pl-list-icon" style="background:linear-gradient(135deg,#FF7043,#E64A19)">\u23F1<\/div><div class="pl-list-info"><div class="pl-list-name">פלייליסט זמני<\/div><div class="pl-list-sub">'+qn+' שירים<\/div><\/div><\/div>';
  html+='<div class="pl-new-row" onclick="plCreateNew()"><span style="font-size:22px">+<\/span> פלייליסט חדש<\/div>';
  if(!pls.length){html+='<div class="pl-empty">אין פלייליסטים עדיין<br><span style="font-size:13px;color:#444">הוסף שירים דרך כפתור +<\/span><\/div>';}
  else{pls.forEach(function(pl){html+='<div class="pl-list-item" onclick="plOpenDetail(\''+pl.id+'\')">'
    +'<div class="pl-list-icon">\uD83C\uDFB5<\/div>'
    +'<div class="pl-list-info"><div class="pl-list-name">'+pl.name+'<\/div>'
    +'<div class="pl-list-sub">'+pl.songs.length+' שירים<\/div><\/div><\/div>';});}
  c.innerHTML=html;
}
function plCreateNew(){
  var name=prompt('שם הפלייליסט:','');if(!name||!name.trim())return;
  var pls=_plLoad();
  pls.push({id:_plId(),name:name.trim(),songs:[],created:Date.now()});
  _plSave(pls);_plRenderList();
}
function plOpenDetail(plId){
  var pls=_plLoad(),pl=pls.find(function(p){return p.id===plId;});if(!pl)return;
  document.getElementById('plDetailName').textContent=pl.name;
  document.getElementById('plDetailView').dataset.plId=plId;
  document.getElementById('plListView').style.display='none';
  document.getElementById('plDetailView').style.display='flex';
  _plRenderDetail(pl);
}
function _plRenderDetail(pl){
  var c=document.getElementById('plDetailSongs');
  if(!pl.songs.length){c.innerHTML='<div class="pl-empty">הפלייליסט ריק<br><span style="font-size:13px;color:#444">הוסף שירים דרך כפתור +<\/span><\/div>';return;}
  var html='';
  pl.songs.forEach(function(s,i){
    html+='<div class="pl-song-row">'
      +'<button class="pl-song-play" onclick="plPlayFrom(\''+pl.id+'\','+i+')">&#9654;<\/button>'
      +'<div class="pl-song-info" onclick="plPlayFrom(\''+pl.id+'\','+i+')"><div class="pl-song-title">'+s.s+'<\/div><div class="pl-song-sub">'+s.a+'<\/div><\/div>'
      +'<button class="pl-song-del" onclick="plRemoveSong(\''+pl.id+'\','+i+')">\u2715<\/button><\/div>';
  });

function plPlayFrom(plId,idx){
  var pls=_plLoad(),pl=pls.find(function(p){return p.id===plId;});
  if(!pl||!pl.songs.length)return;
  var i=idx||0;openModal(pl.songs[i],pl.songs,i);closePlPanel();
}
function plPlayAll(){var plId=document.getElementById('plDetailView').dataset.plId;plPlayFrom(plId,0);}
function plRemoveSong(plId,idx){
  var pls=_plLoad(),pl=pls.find(function(p){return p.id===plId;});if(!pl)return;
  pl.songs.splice(idx,1);_plSave(pls);_plRenderDetail(pl);
}
function plDelete(){
  var plId=document.getElementById('plDetailView').dataset.plId,pls=_plLoad(),pl=pls.find(function(p){return p.id===plId;});
  if(!pl)return;
  if(!confirm('למחוק את "'+pl.name+'"?'))return;
  _plSave(pls.filter(function(p){return p.id!==plId;}));plBackToList();_plRenderList();
}
function plRename(){
  var plId=document.getElementById('plDetailView').dataset.plId,pls=_plLoad(),pl=pls.find(function(p){return p.id===plId;});if(!pl)return;
  var name=prompt('שם חדש:',pl.name);if(!name||!name.trim())return;
  pl.name=name.trim();_plSave(pls);document.getElementById('plDetailName').textContent=pl.name;_plRenderList();
}
function renderQueueTabs(){
  var tabs=document.getElementById('queueTabs');if(!tabs)return;
  var pls=_plLoad(),act=window._activeQueueTab||'temp';
  var isMin=document.getElementById('queuePanel')&&document.getElementById('queuePanel').classList.contains('minimized');
  var h='<div class="q-tab'+(act==='temp'?' active':'')+'" onclick="switchQueueTab(\'temp\',this)">פלייליסט זמני<\/div>';
  pls.forEach(function(pl){
    h+='<div class="q-tab'+(act===pl.id?' active':'')+'" onclick="switchQueueTab(\''+pl.id+'\',this)">'+pl.name+'<\/div>';
  });
  h+='<div style="flex:1;min-width:6px"></div>';
  h+='<button class="q-act-btn q-naka" onclick="clearQueuePanel()">נקה<\/button>';
  h+='<button class="q-play-circle" onclick="(window._activeQueueTab===\'temp\'?playQueue():plPlayFrom(window._activeQueueTab,0));closeQueuePanel()">&#9654;<\/button>';
  h+='<button class="q-act-btn" onclick="toggleQueueMinimize()">'+(isMin?'&#9650;':'&#9660;')+'<\/button>';
  h+='<button class="q-act-btn" onclick="closeQueuePanel()">&#x2715;<\/button>';
  tabs.innerHTML=h;
}
function clearQueuePanel(){
  clearQueue();
  var l=document.getElementById('queuePanelList');
  if(l)l.innerHTML='<div style="padding:24px;text-align:center;color:#666">הרשימה ריקה<\/div>';
  renderQueueTabs();
}
function toggleQueueMinimize(){
  var p=document.getElementById('queuePanel');if(!p)return;
  p.classList.toggle('minimized');
  renderQueueTabs();
}
function addSongToQueueOpen(song){
  if(!song)return;
  var id=song.v||song.mp4;
  if(!isInQueue(id))toggleAddSong(id);
  var p=document.getElementById('queuePanel');if(p)p.classList.remove('minimized');
  openQueuePanel();
}
function switchQueueTab(id,el){
  window._activeQueueTab=id;
  document.querySelectorAll('.q-tab').forEach(function(t){t.classList.remove('active');});
  if(el)el.classList.add('active');
  var list=document.getElementById('queuePanelList');if(!list)return;
  if(id==='temp'){var qp=document.getElementById('queuePanel');if(qp)openQueuePanel();return;}
  var pls=_plLoad(),pl=pls.find(function(p){return p.id===id;});
  if(!pl)return;
  if(!pl.songs.length){list.innerHTML='<div style="padding:20px;text-align:center;color:#888;">פלייליסט ריק<\/div>';return;}
  list.innerHTML=pl.songs.map(function(s,i){return '<div class="q-item" style="cursor:pointer;border-bottom:1px solid rgba(255,255,255,.06);" onclick="plPlayFrom(\''+pl.id+'\','+i+');closeQueuePanel()">'
+'<span class="qi-num">'+(i+1)+'<\/span>'+(s.v?'<div class="qi-thumb" style="background-image:url(https://i.ytimg.com/vi/'+s.v+'/mqdefault.jpg)"><\/div>':'<div class="qi-thumb" style="background:#2a2a2a;display:flex;align-items:center;justify-content:center;font-size:16px">&#9835;<\/div>')+'<div class="qi-info"><div class="qi-name">'+s.s+'<\/div><div class="qi-artist">'+s.a+'<\/div><\/div><\/div>';}).join('');
}

function loadPlaylists(){try{return JSON.parse(localStorage.getItem(PL_KEY)||'[]');}catch(e){return[];}}
function savePlaylists(pls){try{localStorage.setItem(PL_KEY,JSON.stringify(pls));}catch(e){}}
function removeSongFromPl(plId,vid){var pls=loadPlaylists();var pl=pls.find(function(p){return p.id===plId;});if(!pl)return;pl.songs=pl.songs.filter(function(s){return getSongKey(s)!==vid;});savePlaylists(pls);if(document.getElementById('plPanel').classList.contains('open'))renderPlPanel();render(document.getElementById('q').value||'');}

  exitTheaterIfNeeded();
  document.getElementById('plPanel').classList.add('open');
  renderPlPanel();
}
function closePlPanel(){document.getElementById('plPanel').classList.remove('open');closePlCtx();}
function closePlPanelAndPlayer(){
  closePlPanel();
  document.getElementById('playerPanel').classList.remove('open');
  document.body.classList.remove('playing','theater');
  document.body.style.overflow='';
  hideFloatPlayer();
  if(ytPlayer&&playerReady)ytPlayer.pauseVideo();
  var v=document.getElementById('mp4Player');if(v)v.pause();
  document.body.classList.remove('has-song');
  requestAnimationFrame(setTopH);

function playVidFromPl(plId, vid){
  var pls=loadPlaylists();
  var pl=pls.find(function(p){return p.id===plId;});
  if(!pl||!pl.songs.length)return;
  var idx=pl.songs.findIndex(function(s){return (s.v||s.mp4)===vid;});
  if(idx<0)idx=0;
  openModal(pl.songs[idx],pl.songs,idx);
}

function renderPlPanel(){
  var pls=loadPlaylists();
  var body=document.getElementById('plPanelBody');
  if(!pls.length){body.innerHTML='<div style="text-align:center;color:#888;padding:40px 16px;font-size:13px;">אין פלייליסטים עדיין<br><br>לחץ "+ פלייליסט חדש" להתחיל</div>';return;}
  var _openIds={};body.querySelectorAll('.pl-item[data-pl-id]').forEach(function(el){if(el.dataset.open==='true')_openIds[el.dataset.plId]=true;});
  body.innerHTML=pls.map(function(pl){
    var cnt=(pl.songs||[]).length;
    var songs=(pl.songs||[]).map(function(s,si){
      var vid=s.v||s.mp4;
      return '<div class="pl-song-row" draggable="true"'
        +' ondragstart="songDndStart(event,\''+pl.id+'\','+si+')"'
        +' ondragover="songDndOver(event,\''+pl.id+'\','+si+')"'
        +' ondrop="songDndDrop(event,\''+pl.id+'\','+si+')"'
        +' ondragleave="songDndLeave(event)">'
        +'<span class="pl-song-drag" title="גרור לשינוי סדר"><svg width="14" height="12" viewBox="0 0 14 12" fill="currentColor"><rect y="0" width="14" height="2" rx="1"/><rect y="5" width="14" height="2" rx="1"/><rect y="10" width="14" height="2" rx="1"/></svg></span>'
        +'<div class="pl-song-info" onclick="playVidFromPl(\''+pl.id+'\',\''+vid+'\')" style="cursor:pointer;flex:1;min-width:0"><div class="pl-song-name">'+esc(s.s)+'</div><div class="pl-song-artist">'+esc(s.a)+'</div></div>'
        +'<button class="pl-song-play'+(s.mp4?' mp4':'')+'" onclick="playVidFromPl(\''+pl.id+'\',\''+vid+'\')" title="נגן"><svg viewBox="0 0 12 14" fill="'+(s.mp4?'#fff':'#121212')+'" width="10" height="12"><polygon points="0,0 12,7 0,14"/></svg></button>'
        +(s.v?'<a class="btn-yt pl-song-yt" href="https://www.youtube.com/watch?v='+s.v+'" target="_blank" rel="noopener" title="פתח ביוטיוב" onclick="event.stopPropagation()">'+YT_ICO+'</a>':'')
        +'<button class="pl-song-del" onclick="event.stopPropagation();removeSongFromPl(\''+pl.id+'\',\''+vid+'\')" title="הסר">✕</button>'
        +'</div>';
    }).join('');
    return '<div class="pl-item" data-pl-id="'+pl.id+'" data-open="false"'
      +' ondragover="plDndOver(event,\''+pl.id+'\')" ondrop="plDndDrop(event,\''+pl.id+'\')" ondragleave="plDndLeave(event)">'
      +'<div class="pl-item-hdr" onclick="togglePlItem(this)">'
      +'<span class="pl-item-drag" draggable="true" ondragstart="plDndStart(event,\''+pl.id+'\')" onclick="event.stopPropagation()" title="גרור לשינוי סדר"><svg width="14" height="12" viewBox="0 0 14 12" fill="currentColor"><rect y="0" width="14" height="2" rx="1"/><rect y="5" width="14" height="2" rx="1"/><rect y="10" width="14" height="2" rx="1"/></svg></span>'
      +'<div class="pl-item-icon">♫</div>'
      +'<div class="pl-item-info"><div class="pl-item-name">'+esc(pl.name)+'</div><div class="pl-item-count">'+cnt+(cnt===1?' שיר':' שירים')+'</div></div>'
      +'<button class="pl-item-menu-btn" onclick="event.stopPropagation();openPlCtx(event,\''+pl.id+'\')" title="אפשרויות">⋮</button>'
      +'<span class="pl-item-chev">▾</span>'
      +'</div>'
      +(cnt?'<div class="pl-item-songs">'+songs+'</div>':'')
      +'</div>';
  }).join('');
  body.querySelectorAll('.pl-item[data-pl-id]').forEach(function(el){if(_openIds[el.dataset.plId])el.dataset.open='true';});
}
function togglePlItem(hdrEl){var item=hdrEl.closest('.pl-item');item.dataset.open=item.dataset.open==='true'?'false':'true';}
function openPlCtx(e,plId){
  _plCtxId=plId;
  var menu=document.getElementById('plCtxMenu');
  menu.style.left='';menu.style.right='';
  var btn=e.currentTarget;
  var rect=btn.getBoundingClientRect();
  var menuW=150,y=rect.bottom+4;
  var x=rect.left-menuW+rect.width;
  if(x<4)x=4;
  if(x+menuW>window.innerWidth-4)x=window.innerWidth-menuW-4;
  menu.style.top=y+'px';menu.style.left=x+'px';
  menu.classList.add('open');
  setTimeout(function(){document.addEventListener('click',closePlCtx,{once:true});},10);
}
function closePlCtx(){document.getElementById('plCtxMenu').classList.remove('open');_plCtxId=null;}
function plCtxRename(){
  var id=_plCtxId;
  closePlCtx();
  var pls=loadPlaylists();
  var pl=pls.find(function(p){return p.id===id;});if(!pl)return;
  var nameEl=document.querySelector('.pl-item[data-pl-id="'+id+'"] .pl-item-name');
  if(!nameEl)return;
  var orig=pl.name;
  var inp=document.createElement('input');
  inp.type='text';inp.value=orig;
  inp.style.cssText='font-weight:700;font-size:13px;color:#0F0F0F;border:1px solid #ccc;border-radius:6px;padding:2px 6px;outline:none;background:#fff;width:100%;font-family:Arial,sans-serif;direction:rtl;';
  nameEl.innerHTML='';nameEl.appendChild(inp);
  inp.focus();inp.select();
  function save(){
    var v=inp.value.trim();
    if(v&&v!==orig){pl.name=v;savePlaylists(pls);refreshAddBtns();}
    renderPlPanel();
  }
  inp.addEventListener('keydown',function(e){if(e.key==='Enter')inp.blur();if(e.key==='Escape'){inp.value=orig;inp.blur();}});
  inp.addEventListener('blur',save,{once:true});
}
function plCtxDelete(){
  var id=_plCtxId;
  var pls=loadPlaylists();var pl=pls.find(function(p){return p.id===id;});if(!pl)return;
  if(!confirm('למחוק את "'+pl.name+'"?'))return;
  savePlaylists(pls.filter(function(p){return p.id!==id;}));renderPlPanel();refreshAddBtns();
}
function plPanelCreate(){
  var name=prompt('שם הפלייליסט החדש:');
  if(!name||!name.trim())return;
  var pls=loadPlaylists();
  pls.push({id:'pl_'+Date.now(),name:name.trim(),songs:[]});
  savePlaylists(pls);renderPlPanel();
}
var _songDndPlId=null,_songDndIdx=null;
function songDndStart(e,plId,idx){_songDndPlId=plId;_songDndIdx=idx;e.dataTransfer.effectAllowed='move';e.stopPropagation();}
function songDndOver(e,plId,idx){if(_songDndPlId!==plId||_songDndIdx===idx)return;e.preventDefault();e.stopPropagation();document.querySelectorAll('.pl-song-row').forEach(function(el){el.classList.remove('dnd-over');});e.currentTarget.classList.add('dnd-over');}
function songDndLeave(e){e.currentTarget.classList.remove('dnd-over');}
function songDndDrop(e,plId,idx){
  e.preventDefault();e.stopPropagation();
  document.querySelectorAll('.pl-song-row').forEach(function(el){el.classList.remove('dnd-over');});
  if(_songDndPlId!==plId||_songDndIdx===null||_songDndIdx===idx){_songDndIdx=null;_songDndPlId=null;return;}
  var pls=loadPlaylists();
  var pl=pls.find(function(p){return p.id===plId;});
  if(!pl){_songDndIdx=null;_songDndPlId=null;return;}
  var moved=pl.songs.splice(_songDndIdx,1)[0];pl.songs.splice(idx,0,moved);
  savePlaylists(pls);renderPlPanel();_songDndIdx=null;_songDndPlId=null;
}
function plDndStart(e,plId){_plDndId=plId;e.dataTransfer.effectAllowed='move';}
function plDndOver(e,plId){if(_plDndId===plId||_songDndIdx!==null)return;e.preventDefault();e.stopPropagation();document.querySelectorAll('.pl-item').forEach(function(el){el.classList.remove('dnd-over');});e.currentTarget.classList.add('dnd-over');}
function plDndLeave(e){e.currentTarget.classList.remove('dnd-over');}
function plDndDrop(e,targetId){
  e.preventDefault();
  document.querySelectorAll('.pl-item').forEach(function(el){el.classList.remove('dnd-over');});
  if(!_plDndId||_plDndId===targetId){_plDndId=null;return;}
  var pls=loadPlaylists();
  var fi=pls.findIndex(function(p){return p.id===_plDndId;}),ti=pls.findIndex(function(p){return p.id===targetId;});
  if(fi<0||ti<0){_plDndId=null;return;}
  var moved=pls.splice(fi,1)[0];pls.splice(ti,0,moved);
  savePlaylists(pls);renderPlPanel();_plDndId=null;
}
function getSongKey(s){return s?(s.v||s.mp4||''):''}
function isInAnyPlaylist(song){if(!song)return false;const k=getSongKey(song);return loadPlaylists().some(pl=>pl.songs.some(s=>getSongKey(s)===k));}
function isInPlaylist(plId,song){if(!song)return false;const k=getSongKey(song);const pl=loadPlaylists().find(p=>p.id===plId);return pl?pl.songs.some(s=>getSongKey(s)===k):false;}
function toggleSongInPlaylist(plId,song){
  if(!song)return;
  const k=getSongKey(song);
  const pls=loadPlaylists();
  const pl=pls.find(p=>p.id===plId);
  if(!pl)return;
  const idx=pl.songs.findIndex(s=>getSongKey(s)===k);
  if(idx>=0)pl.songs.splice(idx,1);
  else pl.songs.push({v:song.v,s:song.s,a:song.a,mp4:song.mp4||undefined});
  savePlaylists(pls);
  refreshAddBtns();
  if(document.getElementById('plPanel').classList.contains('open'))renderPlPanel();
}
function createPlaylist(name){
  if(!name.trim())return null;
  const pls=loadPlaylists();
  const id='pl_'+Date.now();
  pls.push({id,name:name.trim(),songs:[]});
  savePlaylists(pls);
  return id;
}

function showToast(msg){const t=document.getElementById('karaokToast');if(!t)return;t.textContent=msg;t.classList.add('show');clearTimeout(t._tmr);t._tmr=setTimeout(()=>t.classList.remove('show'),3000);}
function handlePlItemClick(el){
  const plId=el.dataset.plid;
  const pls=loadPlaylists();
  const pl=pls.find(p=>p.id===plId);
  if(!pl||!currentSong)return;
  const wasIn=isInPlaylist(plId,currentSong);
  toggleSongInPlaylist(plId,currentSong);
  showToast(wasIn?'הוסר מ״'+pl.name+'״':'נוסף ל״'+pl.name+'״');
  renderPlPopup();
  updateModalAddBtn();
}
function renderPlPopup(){
  const pls=loadPlaylists();
  const list=document.getElementById('plPopupList');
  const song=currentSong;
  const BON='<svg width="18" height="18" viewBox="0 0 24 24" fill="#0F0F0F"><path d="M17 3H7c-1.1 0-2 .9-2 2v16l7-3 7 3V5c0-1.1-.9-2-2-2z"/></svg>';
  const BOFF='<svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="#606060" stroke-width="2"><path d="M17 3H7c-1.1 0-2 .9-2 2v16l7-3 7 3V5c0-1.1-.9-2-2-2z"/></svg>';
  if(!pls.length){list.innerHTML='<div style="padding:10px 16px;font-size:12px;color:#888;">אין עדיין פלייליסטים</div>';return;}
  list.innerHTML=pls.map(pl=>{
    const inPl=isInPlaylist(pl.id,song);
    return '<div class="playlist-popup-item" data-plid="'+pl.id+'" onclick="handlePlItemClick(this)">'+
      (inPl?BON:BOFF)+'<span class="pl-name">'+esc(pl.name)+'</span></div>';
  }).join('');
}

function showPlaylistPopupForSong(e,vid){
  if(e)e.stopPropagation();
  var song=ALL.find(function(s){return (s.v||s.mp4)===vid;});
  if(!song)return;
  currentSong=song;
  window._plScrollY=window.scrollY;
  var popup=document.getElementById('playlistPopup');
  var btn=e.currentTarget||e.target;
  var rect=btn.getBoundingClientRect();
  popup.style.top=(rect.bottom+8)+'px';
  popup.style.bottom='auto';
  popup.style.right=Math.max(8,Math.min(window.innerWidth-rect.right,window.innerWidth-248))+'px';
  renderPlPopup();
  popup.classList.add('open');
  setTimeout(function(){document.addEventListener('click',closePlPopupOutside);},50);
}
function showPlaylistPopup(e){
  if(e)e.stopPropagation();
  if(!currentSong)return;
  const popup=document.getElementById('playlistPopup');
  const btn=document.getElementById('modalAddBtn');
  const rect=btn.getBoundingClientRect();
  popup.style.top=(rect.bottom+8)+'px';
  popup.style.bottom='auto';
  popup.style.right=Math.max(8,Math.min(window.innerWidth-rect.right,window.innerWidth-248))+'px';
  renderPlPopup();
  popup.classList.add('open');
  setTimeout(()=>document.addEventListener('click',closePlPopupOutside),50);
}
function closePlPopupOutside(e){
  const popup=document.getElementById('playlistPopup');
  if(!popup.contains(e.target)&&e.target.id!=='modalAddBtn'){closePlaylistPopup();}
}
function closePlaylistPopup(){
  document.getElementById('playlistPopup').classList.remove('open');
  const f=document.getElementById('newPlForm');if(f)f.classList.remove('open');
  const inp=document.getElementById('newPlInp');if(inp)inp.value='';
  document.removeEventListener('click',closePlPopupOutside);
}

function submitNewPlaylist(){
  const inp=document.getElementById('newPlInp');
  const name=inp.value.trim();
  if(!name)return;
  const id=createPlaylist(name);
  if(id&&currentSong)toggleSongInPlaylist(id,currentSong);
  updateModalAddBtn();
  inp.value='';
  if(window.innerWidth<=767){var _sy=window._plScrollY||0;inp.blur();if(window.visualViewport){var _vvh=window.visualViewport;var _fn=function(){document.documentElement.scrollLeft=0;document.body.scrollLeft=0;window.scrollTo(0,_sy);_vvh.removeEventListener('resize',_fn);};_vvh.addEventListener('resize',_fn);}else{setTimeout(function(){document.documentElement.scrollLeft=0;document.body.scrollLeft=0;window.scrollTo(0,_sy);},400);}}
  closePlaylistPopup();
}

document.addEventListener('DOMContentLoaded',function(){

  },{passive:false});

const pin=document.getElementById('_umCodePin').value;if(!pin)return;
const hv=await _sha256(pin);
