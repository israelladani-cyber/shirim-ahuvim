<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>קריוקי מזרחית</title>
<link rel="icon" type="image/svg+xml" href="logo%209.svg">
<link rel="icon" type="image/svg+xml" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 32 32'%3E%3Crect width='32' height='32' rx='6' fill='%23121212'/%3E%3Crect x='12' y='3' width='8' height='14' rx='4' fill='%231DB954'/%3E%3Cpath d='M8 15 Q8 24 16 24 Q24 24 24 15' fill='none' stroke='%231DB954' stroke-width='2.5' stroke-linecap='round'/%3E%3Cline x1='16' y1='24' x2='16' y2='28' stroke='%231DB954' stroke-width='2.5' stroke-linecap='round'/%3E%3Cline x1='11' y1='28' x2='21' y2='28' stroke='%231DB954' stroke-width='2.5' stroke-linecap='round'/%3E%3C/svg%3E">
<style>
*{box-sizing:border-box;margin:0;padding:0;}
body{font-family:Arial,sans-serif;background:#F9F9F9;color:#0F0F0F;direction:rtl;min-height:100vh;padding-bottom:80px;}

/* TOP BAR */
.top{background:rgba(255,255,255,.97);backdrop-filter:blur(20px);border-bottom:1px solid #E5E5E5;padding:0 24px;position:sticky;top:0;z-index:10;}
.top-row{min-height:80px;display:flex;align-items:center;justify-content:center;}
.brand{position:absolute;right:12px;top:50%;transform:translateY(-50%);display:flex;align-items:center;cursor:pointer;}

/* SEARCH SECTION */
.search-section{width:860px;max-width:calc(100% - 24px);display:flex;align-items:center;gap:12px;flex-shrink:0;}
.yt-search{position:relative;flex:1;display:flex;align-items:center;direction:ltr;background:#fff;border-radius:24px;border:1px solid #ddd;height:38px;padding:0 12px;gap:8px;transition:box-shadow .2s;}
.yt-search:focus-within{box-shadow:0 0 0 2px #FF0000;border-color:transparent;}
.yt-search-icon{display:flex;align-items:center;color:#606060;flex-shrink:0;cursor:pointer;}
.yt-search input{flex:1;border:none;outline:none;font-size:16px;color:#121212;background:transparent;direction:rtl;font-family:Arial,sans-serif;min-width:0;}
.yt-search input::placeholder{color:#999;}
.yt-clear{background:none;border:none;cursor:pointer;color:#999;font-size:18px;line-height:1;display:none;flex-shrink:0;}
.yt-clear.visible{display:block;}
.yt-history{position:absolute;top:calc(100% + 6px);left:0;right:0;background:#fff;border-radius:14px;box-shadow:0 4px 24px rgba(0,0,0,.18);display:none;z-index:200;overflow:hidden;}
.yt-history.open{display:block;}
.yt-hist-item{display:flex;align-items:center;gap:10px;padding:10px 16px;cursor:pointer;color:#0F0F0F;font-size:14px;font-family:Arial,sans-serif;direction:rtl;}
.yt-hist-item:hover{background:#f5f5f5;}
.yt-hist-item svg{flex-shrink:0;color:#888;}
.yt-hist-clear{text-align:center;padding:8px;font-size:12px;color:#888;cursor:pointer;border-top:1px solid #eee;}
.yt-hist-clear:hover{background:#f5f5f5;color:#e00;}
.stats{color:#0F0F0F;font-size:12px;}.stats b{color:#FF0000;}
.toolbar-btn{display:flex;align-items:center;gap:6px;background:#F2F2F2;border:none;color:#0F0F0F;border-radius:8px;padding:6px 12px;font-size:12px;font-weight:600;cursor:pointer;transition:background .15s,color .15s;font-family:Arial,sans-serif;}
.toolbar-btn:hover{background:rgba(0,0,0,.07);color:#0F0F0F;}
.toolbar-btn .bc{transition:transform .25s;display:flex;align-items:center;}
.all-closed .bc{transform:rotate(-90deg);}

/* CONTENT */
.content{padding:20px 16px;max-width:860px;margin:0 auto;}
.artist-block{margin-bottom:14px;background:#FFFFFF;border-radius:12px;overflow:hidden;}
.artist-block:hover{background:#F2F2F2;}
.artist-header{display:flex;align-items:center;gap:12px;padding:6px 16px;background:#F2F2F2;cursor:pointer;user-select:none;}
.artist-header:hover{background:#E5E5E5;}
.artist-avatar{width:60px;height:60px;background:linear-gradient(135deg,#FF0000,#CC0000);border-radius:50%;display:flex;align-items:center;justify-content:center;font-weight:800;font-size:20px;color:#000;flex-shrink:0;overflow:hidden;background-size:cover;background-position:center top;position:relative;}
.artist-avatar.has-photo{box-shadow:0 2px 8px rgba(0,0,0,.5);}
body.admin .artist-avatar{cursor:pointer;}
body.admin .artist-avatar::after{content:'📷';position:absolute;inset:0;display:none;align-items:center;justify-content:center;background:rgba(0,0,0,.45);font-size:22px;border-radius:50%;}
body.admin .artist-avatar:hover::after{display:flex;}
.artist-name-text{font-size:17px;font-weight:700;flex:1;}
.chevron{color:#0F0F0F;transition:transform .25s;display:flex;align-items:center;}
.artist-block[data-open="false"] .chevron{transform:rotate(-90deg);}
.songs-wrap{overflow:hidden;}
.artist-block[data-open="false"] .songs-wrap{display:none;}

/* SONGS TABLE */
.songs-table{width:100%;border-collapse:collapse;}
.songs-table tr{border-bottom:1px solid rgba(255,255,255,.04);transition:background .1s;}
.songs-table tr:last-child{border-bottom:none;}
.songs-table tr:hover{background:rgba(0,0,0,.05);}
.songs-table td{padding:10px 14px;font-size:15px;color:#0F0F0F;vertical-align:middle;}
.songs-table tr:hover td{color:#0F0F0F;}
.td-num{width:28px;text-align:center;color:#909090;font-size:14px;}
.td-actions{width:112px;text-align:left;}
.song-artist-sub{font-size:11px;color:#909090;margin-top:2px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}
.songs-table tr:hover .song-artist-sub{color:#888;}
.song-actions{display:flex;align-items:center;gap:5px;justify-content:flex-start;}

/* ACTION BUTTONS */
.btn-play{width:30px;height:30px;border-radius:50%;background:#FFFFFF;border:1px solid #E5E5E5;cursor:pointer;display:flex;align-items:center;justify-content:center;flex-shrink:0;transition:transform .15s,background .15s,border-color .15s;padding-right:1px;}.btn-play.mp4{background:#00BCD4!important;border-color:#00ACC1!important;}.btn-play.mp4 svg polygon{fill:#fff!important;}
.btn-play:hover{transform:scale(1.1);background:#e8e8e8;}
.btn-play svg{width:12px;height:14px;}
.btn-add{width:28px;height:28px;border-radius:50%;background:none;border:1.5px solid #444;color:#0F0F0F;cursor:pointer;display:flex;align-items:center;justify-content:center;flex-shrink:0;font-size:16px;line-height:1;transition:all .15s;}
.btn-add:hover,.btn-add.in-queue{background:#FF0000;border-color:#FF0000;color:#000;}
.btn-yt{width:28px;height:20px;background:#FF0000;border-radius:5px;display:inline-flex;align-items:center;justify-content:center;text-decoration:none;transition:transform .15s,opacity .15s;opacity:.85;flex-shrink:0;}
.btn-yt:hover{opacity:1;transform:scale(1.08);}

/* LAYOUT */
:root{--top-h:120px;}
.page-body{display:flex;}
.list-panel{flex:1;min-width:0;}
body.playing .content{max-width:none;margin:0;}

/* PLAYER PANEL */
.player-panel{flex:0 0 75%;display:none;flex-direction:column;background:#FFFFFF;border-right:1px solid #E5E5E5;}
.panel-header{display:flex;align-items:center;gap:6px;padding:8px 12px;background:#F9F9F9;border-bottom:1px solid #333;flex-shrink:0;}
.panel-song-info{flex:1;min-width:0;}
.panel-song-name{font-size:14px;font-weight:700;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}
.panel-artist-name{font-size:11px;color:#0F0F0F;margin-top:1px;}
.panel-close{background:none;border:none;color:#888;cursor:pointer;font-size:20px;width:30px;height:30px;display:flex;align-items:center;justify-content:center;border-radius:50%;transition:background .15s,color .15s;flex-shrink:0;}
.panel-close:hover{background:#0F0F0F;color:#0F0F0F;}
.panel-minimize-btn{background:none;border:none;color:#888;cursor:pointer;font-size:18px;width:30px;height:30px;display:flex;align-items:center;justify-content:center;border-radius:50%;transition:background .15s,color .15s;flex-shrink:0;line-height:1;}
.panel-minimize-btn:hover{background:#0F0F0F;color:#0F0F0F;}
.panel-pip-btn{display:none!important;}
.panel-float-btn,.panel-theater-btn{display:none;background:none;border:none;color:#888;cursor:pointer;width:30px;height:30px;align-items:center;justify-content:center;border-radius:50%;transition:background .15s,color .15s;flex-shrink:0;}
.panel-float-btn:hover,.panel-theater-btn:hover{background:#0F0F0F;color:#0F0F0F;}
body.theater .panel-theater-btn{color:#FF0000;}
@media(min-width:768px){.panel-float-btn,.panel-theater-btn{display:flex;}}
.panel-video{position:relative;flex:1;min-height:0;background:#000;}
.panel-video iframe{position:absolute;inset:0;width:100%;height:100%;}
.panel-footer{display:flex;align-items:center;gap:8px;padding:12px 18px;background:#F9F9F9;border-top:1px solid #333;flex-shrink:0;}
.modal-nav-btn{background:#F2F2F2;border:none;color:#0F0F0F;border-radius:8px;padding:7px 14px;font-size:12px;font-weight:600;cursor:pointer;font-family:Arial,sans-serif;transition:background .15s,color .15s;display:flex;align-items:center;gap:5px;}
.modal-nav-btn:hover{background:#F2F2F2;color:#0F0F0F;}
.modal-nav-btn:disabled{opacity:.35;cursor:default;}
.modal-queue-info{flex:1;text-align:center;font-size:12px;color:#0F0F0F;}
.modal-queue-info b{color:#FF0000;}
.modal-add-btn{background:#FF0000;border:none;color:#000;border-radius:8px;padding:7px 14px;font-size:12px;font-weight:700;cursor:pointer;font-family:Arial,sans-serif;transition:opacity .15s;}
.modal-add-btn:hover{opacity:.85;}
.modal-add-btn.in-queue{background:#535353;color:#0F0F0F;}

/* DESKTOP PLAYING: compact top bar + side-by-side */
@media(min-width:768px){
  body.playing .page-body{height:calc(100dvh - var(--top-h));overflow:hidden;}
  body.playing .player-panel{display:flex;height:100%;}
  body.playing .list-panel{overflow-y:auto;height:100%;}
  body.playing .top{padding:8px 24px;}
  /* Theater mode: player takes full width */
  body.playing.theater .player-panel{flex:0 0 100%!important;}
  body.playing.theater .list-panel{display:none!important;}
}

/* MOBILE: overlay + mini bar */
@media(max-width:767px){
  .player-panel{position:fixed;inset:0;z-index:300;flex-direction:column;background:#FFFFFF;}
  .player-panel.open{display:flex;}
  body.playing{padding-bottom:70px;}body.has-song{padding-bottom:57px;}
  body.playing .queue-bar{bottom:90px;}

  /* Mobile top bar layout */
  .top-row{flex-direction:column;align-items:stretch;gap:6px;min-height:unset;padding:8px 0 6px;}
  .brand{position:static;transform:none;display:flex;justify-content:center;}
  .queue-bar{position:static;transform:none;align-self:center;}
  .search-section{width:100%;max-width:100%;flex-wrap:wrap;gap:8px;}
  /* Hide button text on mobile - icons only */
  .toolbar-btn .btn-label{display:none;}
}

/* ── FLOAT PLAYER (PiP) ── */
/* flex column: video on top, drag-bar below — no overlay blocking the iframe */
.float-player{position:fixed;left:0;top:0;width:340px;border-radius:14px;overflow:hidden;box-shadow:0 10px 36px rgba(0,0,0,.18);z-index:9999;display:none;background:#FFFFFF;touch-action:none;user-select:none;}
.float-player.visible{display:flex;flex-direction:column;}
/* Float mode mini-PIP: panel stays in DOM, CSS positions it as a fixed mini window */
@media(min-width:768px){
  body.float-playing .player-panel{display:flex!important;position:fixed!important;right:12px!important;bottom:96px;left:auto!important;width:340px;height:192px;z-index:9998;border-radius:14px 14px 0 0;box-shadow:0 10px 36px rgba(0,0,0,.18);overflow:hidden;flex-direction:column;}
  body.float-playing .panel-header{display:none!important;}
  body.float-playing .panel-footer{display:none!important;}
  body.float-playing .panel-video{flex:1!important;min-height:0!important;}
  body.float-playing #float-video-slot{display:none!important;}
}
.float-player.pip-snap{transition:left .2s cubic-bezier(.25,.46,.45,.94),top .2s cubic-bezier(.25,.46,.45,.94);}
@media(min-width:768px){body.float-playing .player-panel.pip-snap{transition:left .2s cubic-bezier(.25,.46,.45,.94),top .2s cubic-bezier(.25,.46,.45,.94)!important;}}
/* video slot — explicit height, no overlay blocking it */
#float-video-slot{width:100%;height:124px;position:relative;overflow:hidden;background:#000;flex-shrink:0;}
#float-video-slot #yt-player{width:100%!important;height:100%!important;}
#float-video-slot #yt-player iframe{width:100%!important;height:100%!important;display:block!important;}
/* bottom bar — this is the drag handle; video above is fully interactive */
.float-bar{display:flex;align-items:center;background:#FFFFFF;padding:6px 8px 6px 12px;gap:4px;cursor:grab;touch-action:none;flex-shrink:0;border-top:1px solid #E5E5E5;}
.float-bar.grabbing{cursor:grabbing;}
.float-bar-song{flex:1;font-size:13px;color:#bbb;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;direction:rtl;min-width:0;pointer-events:none;line-height:1.3;}
.fbar-btn{background:none;border:none;color:#888;cursor:pointer;font-size:15px;width:34px;height:34px;display:flex;align-items:center;justify-content:center;border-radius:50%;transition:color .12s,background .12s;flex-shrink:0;}
.fbar-btn:hover,.fbar-btn:active{color:#0F0F0F;background:rgba(0,0,0,.12);}
#pipPlayBtn{font-size:20px;color:#ddd;}
body.float-playing .mini-bar{display:none!important;}
@media(max-width:767px){
  .float-player{width:185px;}
  #float-video-slot{height:104px;}
  body.float-playing{padding-bottom:16px;}
  .float-bar{padding:4px 5px 4px 8px;gap:2px;}
  .float-bar-song{font-size:10px;}
  .fbar-btn{width:26px;height:26px;font-size:12px;}
  #pipPlayBtn{font-size:15px;}
}

/* MINI BAR */
.mini-bar{display:none;position:fixed;bottom:0;left:0;right:0;background:#FAFAFA;border-top:1px solid #333;border-radius:16px 16px 0 0;padding:3px 16px 10px;z-index:200;align-items:center;gap:12px;cursor:pointer;box-shadow:0 -4px 24px rgba(0,0,0,.5);}
body.has-song:not(.playing) .mini-bar{display:flex;}
.mini-thumb{width:44px;height:44px;border-radius:8px;background:#0F0F0F;flex-shrink:0;background-size:cover;background-position:center;}
.mini-info{flex:1;min-width:0;}
.mini-song{font-size:13px;font-weight:700;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}
.mini-artist{font-size:11px;color:#0F0F0F;margin-top:2px;}
.mini-ctrl{background:none;border:none;color:#0F0F0F;cursor:pointer;font-size:20px;width:36px;height:36px;display:flex;align-items:center;justify-content:center;border-radius:50%;flex-shrink:0;transition:background .15s;}
.mini-ctrl:hover{background:rgba(0,0,0,.1);}

/* QUEUE BAR */
.queue-bar{position:absolute;left:12px;top:50%;transform:translateY(-50%);z-index:200;background:#FF0000;border-radius:500px;padding:7px 16px;display:flex;align-items:center;gap:8px;box-shadow:0 4px 12px rgba(0,0,0,.4);transition:opacity .3s;opacity:0;pointer-events:none;white-space:nowrap;}
.queue-bar.visible{opacity:1;pointer-events:auto;}
.queue-bar-text{font-size:13px;font-weight:700;color:#000;}
.queue-play-btn{background:#000;color:#FF0000;border:none;border-radius:500px;padding:5px 14px;font-size:12px;font-weight:700;cursor:pointer;font-family:Arial,sans-serif;}
.queue-clear-btn{background:none;border:none;color:rgba(0,0,0,.6);cursor:pointer;font-size:18px;line-height:1;padding:0 0 0 4px;}

mark{background:rgba(29,185,84,.2);color:#FF0000;border-radius:3px;padding:0 2px;font-weight:700;}
.no-results{text-align:center;padding:60px 20px;color:#0F0F0F;font-size:15px;}

/* QUEUE PANEL */
.queue-panel{position:fixed;bottom:0;left:0;right:0;max-height:65vh;overflow-y:auto;background:#FFFFFF;border-top:2px solid #FF0000;border-radius:20px 20px 0 0;z-index:600;transform:translateY(110%);transition:transform .35s cubic-bezier(.4,0,.2,1);}
.queue-panel.open{transform:translateY(0);}
.queue-panel-header{display:flex;align-items:center;justify-content:space-between;padding:16px 20px 12px;border-bottom:1px solid #333;position:sticky;top:0;background:#FFFFFF;z-index:1;}
.queue-panel-title{font-size:15px;font-weight:700;color:#0F0F0F;}
.queue-panel-actions{display:flex;gap:8px;align-items:center;}
.q-play-btn{background:#FF0000;border:none;color:#000;border-radius:8px;padding:7px 14px;font-size:12px;font-weight:700;cursor:pointer;font-family:Arial,sans-serif;}
.q-clear-btn{background:#0F0F0F;border:none;color:#0F0F0F;border-radius:8px;padding:7px 12px;font-size:12px;cursor:pointer;font-family:Arial,sans-serif;}
.q-close-btn{background:none;border:none;color:#888;cursor:pointer;font-size:22px;width:32px;height:32px;display:flex;align-items:center;justify-content:center;border-radius:50%;}
.q-close-btn:hover{background:#0F0F0F;color:#0F0F0F;}
.queue-item{display:flex;align-items:center;padding:10px 20px;gap:12px;border-bottom:1px solid rgba(255,255,255,.04);transition:background .1s;cursor:pointer;}
.queue-item:hover{background:rgba(0,0,0,.05);}
.qi-num{color:#909090;font-size:12px;min-width:20px;text-align:center;flex-shrink:0;}
.qi-thumb{width:42px;height:42px;border-radius:6px;background:#0F0F0F;flex-shrink:0;background-size:cover;background-position:center;}
.qi-info{flex:1;min-width:0;}
.qi-name{font-size:13px;color:#0F0F0F;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}
.qi-artist{font-size:11px;color:#0F0F0F;margin-top:2px;}
.qi-rm{background:none;border:none;color:#909090;cursor:pointer;font-size:18px;width:30px;height:30px;display:flex;align-items:center;justify-content:center;border-radius:50%;transition:all .15s;flex-shrink:0;}
.qi-rm:hover{background:#0F0F0F;color:#e04;}
.queue-overlay{position:fixed;inset:0;background:rgba(0,0,0,.6);z-index:599;display:none;}
.queue-overlay.open{display:block;}

/* ── ADMIN MODE ── */
.admin-lock{background:none;border:none;color:#606060;cursor:pointer;font-size:17px;width:32px;height:32px;display:flex;align-items:center;justify-content:center;border-radius:50%;transition:all .15s;flex-shrink:0;padding:0;}
.admin-lock:hover{background:#F2F2F2;color:#0F0F0F;}
body.admin .admin-lock{color:#FF0000;}
.adm-overlay{position:fixed;inset:0;background:rgba(0,0,0,.78);z-index:2000;display:none;align-items:center;justify-content:center;}
.adm-overlay.open{display:flex;}
.adm-box{background:#FAFAFA;border:1px solid #333;border-radius:16px;padding:28px;width:360px;max-width:92vw;direction:rtl;box-shadow:0 24px 64px rgba(0,0,0,.9);}
.adm-title{font-size:17px;font-weight:700;margin-bottom:18px;color:#0F0F0F;}
.adm-inp{width:100%;background:#E5E5E5;border:1px solid #444;color:#0F0F0F;border-radius:8px;padding:10px 14px;font-size:15px;font-family:Arial,sans-serif;box-sizing:border-box;margin-bottom:10px;direction:rtl;}
.adm-inp:focus{outline:none;border-color:#FF0000;}
.adm-err{color:#ff5a5a;font-size:13px;margin-bottom:10px;min-height:18px;}
.adm-row{display:flex;gap:8px;margin-top:4px;}
.adm-btn{flex:1;background:#FF0000;border:none;color:#000;border-radius:8px;padding:10px 0;font-size:14px;font-weight:700;cursor:pointer;font-family:Arial,sans-serif;}
.adm-btn.sec{background:#E5E5E5;color:#0F0F0F;flex:1;border:1px solid #444;}
.adm-btn.sec:hover{background:#0F0F0F;color:#0F0F0F;}
.adm-note{font-size:12px;color:#888;line-height:1.7;margin-bottom:14px;}
.adm-note b{color:#ccc;}
/* ── ADMIN TOOLBAR ── */
.adm-toolbar{position:fixed;bottom:0;left:0;right:0;background:rgba(255,255,255,.97);backdrop-filter:blur(20px);border-top:2px solid #fff;padding:10px 16px;z-index:600;display:none;direction:rtl;gap:8px;flex-direction:row;flex-wrap:nowrap;align-items:center;overflow-x:auto;}
body.admin .adm-toolbar{display:flex;}
.atb-add-row,.atb-actions-row{display:contents;}
/* Inputs match site search bar */
.atb-inp{background:#fff;border:1px solid #ddd;color:#121212;border-radius:24px;height:36px;padding:0 14px;font-size:14px;font-family:Arial,sans-serif;direction:rtl;min-width:0;flex-shrink:0;}
.atb-inp:focus{outline:none;box-shadow:0 0 0 2px #FF0000;border-color:transparent;}
.atb-inp[id="atbArtist"],.atb-inp[id="atbSong"]{width:130px;}
select.atb-artist-sel{cursor:pointer;padding-left:4px;}
.atb-inp[id="atbUrl"]{flex:1;min-width:120px;max-width:860px;flex-shrink:1;}
/* Buttons match site toolbar-btn style */
.atb-btn{display:flex;align-items:center;gap:6px;background:#F2F2F2;border:none;color:#0F0F0F;border-radius:8px;padding:6px 14px;font-size:12px;font-weight:600;cursor:pointer;transition:background .15s,color .15s;font-family:Arial,sans-serif;white-space:nowrap;flex-shrink:0;}
.atb-btn:hover{background:rgba(0,0,0,.07);color:#0F0F0F;}
.atb-btn:disabled{opacity:.5;cursor:default;}
.atb-btn.green{background:#FF0000;color:#000;font-weight:700;}
.atb-btn.green:hover{background:#CC0000;}
.atb-btn.warn{background:#F2F2F2;color:#0F0F0F;}

// ── QUEUE ──
let queue=[], ytPlayer=null, playerReady=false, _pipWin=null;
// currentSong: what's open in modal right now
let currentSong=null, currentSongList=[], currentSongIdx=0;

function onYouTubeIframeAPIReady(){
  ytPlayer=new YT.Player('yt-player',{
    width:'100%',height:'100%',
    playerVars:{autoplay:1,rel:0,modestbranding:1},
    events:{
      onReady:()=>{playerReady=true;const ifr=document.querySelector('#yt-player iframe');if(ifr){const a=ifr.getAttribute('allow')||'';if(!a.includes('autoplay'))ifr.setAttribute('allow',a+';autoplay;picture-in-picture');}},
      onStateChange:(e)=>{
        if(e.data===YT.PlayerState.ENDED)modalNav(1);
        const playing=e.data===YT.PlayerState.PLAYING;
        const b=document.getElementById('miniPlayBtn');if(b)b.textContent=playing?'⏸':'▶';
        const pb=document.getElementById('pipPlayBtn');if(pb)pb.textContent=playing?'⏸':'▶';
        if('mediaSession' in navigator)navigator.mediaSession.playbackState=playing?'playing':(e.data===YT.PlayerState.PAUSED?'paused':'none');
      },
      onError:(e)=>{
        // YouTube error codes: 2=invalid ID, 5=HTML5 error, 100=not found, 101/150=embed not allowed
        console.warn('YouTube player error:',e.data);
        if(e.data===101||e.data===150){
          const vid=currentSong?currentSong.v:null;
          if(vid){window.open('https://www.youtube.com/watch?v='+vid,'_blank');}
          _atbStat('▶ נפתח ביוטיוב','ok');
        }else if(e.data===100){
          setTimeout(()=>{ if(currentSongIdx<currentSongList.length-1)modalNav(1); },2000);
        }
      }
    }
  });
}

function addToQueue(song){
  if(queue.some(s=>s.v===song.v))return;
  queue.push(song);
  updateQueueBar();
  refreshAddBtns();
}
function removeFromQueue(vid){
  queue=queue.filter(s=>(s.v||s.mp4)!==vid);
  updateQueueBar();
  refreshAddBtns();
}
function clearQueue(){queue=[];updateQueueBar();refreshAddBtns();}
function isInQueue(vid){return queue.some(s=>s.v===vid);}

function updateQueueBar(){
  const bar=document.getElementById('queueBar');
  bar.className='queue-bar'+(queue.length>0?' visible':'');
  document.getElementById('queueBarText').textContent=`${queue.length} ${queue.length===1?'שיר':'שירים'} בפלייליסט`;
  // Update panel count
  const cnt=document.getElementById('queuePanelCount');
  if(cnt)cnt.textContent=queue.length;
  // Re-render panel list if it's open
  if(document.getElementById('queuePanel')?.classList.contains('open'))openQueuePanel();
}
function refreshAddBtns(){
  document.querySelectorAll('.btn-add[data-vid]').forEach(b=>{
    b.className='btn-add'+(isInQueue(b.dataset.vid)?' in-queue':'');
    b.title=isInQueue(b.dataset.vid)?'הסר מהפלייליסט':'הוסף לפלייליסט';
  });
  updateModalAddBtn();
}
function toggleAddSong(vid){
  const song=ALL.find(s=>(s.v||s.mp4)===vid);
  if(!song)return;
  if(isInQueue(vid))removeFromQueue(vid);
  else addToQueue(song);
}

function setTopH(){document.documentElement.style.setProperty('--top-h',document.querySelector('.top').offsetHeight+'px');}

function playVid(vid){
  const song=ALL.find(s=>(s.v||s.mp4)===vid);
  if(!song)return;
  const songList=ALL.filter(s=>s.a===song.a);
  const idx=songList.findIndex(s=>(s.v||s.mp4)===vid);
  openModal(song,songList,idx);
  setTimeout(()=>{
    const artistEl=document.querySelector('.artist-avatar[data-artist="'+CSS.escape(song.a)+'"]');
    const blk=artistEl?artistEl.closest('.artist-block'):null;
    if(blk){blk.dataset.open='true';blk.scrollIntoView({behavior:'smooth',block:'nearest'});}
  },150);
}

function setupMediaSession(song){
  if(!('mediaSession' in navigator))return;
  navigator.mediaSession.metadata=new MediaMetadata({
    title:song.s,
    artist:song.a||'',
    album:'שירים אהובים',
    artwork:[
      {src:`https://i.ytimg.com/vi/${song.v}/mqdefault.jpg`,sizes:'320x180',type:'image/jpeg'},
      {src:`https://i.ytimg.com/vi/${song.v}/maxresdefault.jpg`,sizes:'1280x720',type:'image/jpeg'}
    ]
  });
  navigator.mediaSession.setActionHandler('play',()=>{if(ytPlayer&&playerReady)ytPlayer.playVideo();});
  navigator.mediaSession.setActionHandler('pause',()=>{if(ytPlayer&&playerReady)ytPlayer.pauseVideo();});
  navigator.mediaSession.setActionHandler('nexttrack',()=>modalNav(1));
  navigator.mediaSession.setActionHandler('previoustrack',()=>modalNav(-1));
  try{navigator.mediaSession.setActionHandler('seekto',(d)=>{if(ytPlayer&&playerReady&&d.seekTime!=null)ytPlayer.seekTo(d.seekTime,true);});}catch(e){}
  try{navigator.mediaSession.setActionHandler('seekbackward',(d)=>{if(ytPlayer&&playerReady)ytPlayer.seekTo(Math.max(0,(ytPlayer.getCurrentTime()||-0)-(d.seekOffset||10)),true);});}catch(e){}
  try{navigator.mediaSession.setActionHandler('seekforward',(d)=>{if(ytPlayer&&playerReady)ytPlayer.seekTo((ytPlayer.getCurrentTime()||0)+(d.seekOffset||10),true);});}catch(e){}
}

function openModal(song,songList,idx,startSeconds){
  // Close Document PiP first so player iframe is back in main doc
  if(_pipWin){try{_pipWin.close();}catch(e){}_pipWin=null;}
  // If the same song is already playing/buffering in the float player, just restore panel — don't restart
  if(!song.mp4&&song.v===currentSong?.v&&document.body.classList.contains('float-playing')&&ytPlayer&&playerReady){
    hideFloatPlayer();
    document.getElementById('panelSong').textContent=song.s;
    document.getElementById('panelArtist').textContent=song.a;
    document.body.classList.add('playing');
    document.body.classList.add('has-song');
    if(window.innerWidth<768){document.getElementById('playerPanel').classList.add('open');document.body.style.overflow='hidden';}
    requestAnimationFrame(setTopH);
    updateModalNav();
    updateModalAddBtn();
    // No DOM move happened — iframe never left panel-slot — just ensure video is playing
    const st=ytPlayer.getPlayerState();
    if(st!==YT.PlayerState.PLAYING&&st!==YT.PlayerState.BUFFERING)ytPlayer.playVideo();
    return;
  }
  hideFloatPlayer();
  currentSong=song;currentSongList=songList;currentSongIdx=idx;
  document.getElementById('panelSong').textContent=song.s;
  document.getElementById('panelArtist').textContent=song.a;
  document.getElementById('miniSong').textContent=song.s;
  document.getElementById('miniArtist').textContent=song.a;
  if(song.mp4){document.getElementById('miniThumb').style.backgroundImage='none';}else{document.getElementById('miniThumb').style.backgroundImage=`url('https://i.ytimg.com/vi/${song.v}/mqdefault.jpg')`;}
  // Open panel FIRST so iframe is visible before seeking/playing
  document.body.classList.add('playing');
  document.body.classList.add('has-song');
  if(window.innerWidth<768){document.getElementById('playerPanel').classList.add('open');document.body.style.overflow='hidden';}
  requestAnimationFrame(setTopH);
  const start=startSeconds||0;
  function _loadOrSeek(vid,sec){
    let curVid=null;try{curVid=ytPlayer.getVideoData()?.video_id;}catch(e){}
    const st=ytPlayer.getPlayerState();
    // Only seek+play when video is genuinely paused — all other states use loadVideoById for reliability
    if(curVid===vid&&st===YT.PlayerState.PAUSED){
      ytPlayer.seekTo(sec,true);ytPlayer.playVideo();
    }else{
      ytPlayer.loadVideoById({videoId:vid,startSeconds:sec});
    }
  }
  if(song.mp4){var _m=document.getElementById('mp4Player');document.getElementById('yt-player').style.display='none';_m.style.display='block';_m.src=song.mp4;_m.currentTime=start;_m.play().catch(()=>{});}else{document.getElementById('yt-player').style.display='';var _m2=document.getElementById('mp4Player');if(_m2){_m2.style.display='none';_m2.pause();_m2.src='';}if(ytPlayer&&playerReady)_loadOrSeek(song.v,start);else setTimeout(()=>{if(ytPlayer&&playerReady)_loadOrSeek(song.v,start);},500);}
  document.getElementById('miniPlayBtn').textContent='⏸';
  updateModalNav();
  updateModalAddBtn();
  saveSession(song);
  setupMediaSession(song);
}

  // Mobile: expand mini bar to full overlay
  document.getElementById('playerPanel').classList.add('open');
  document.body.classList.add('playing');
  document.body.style.overflow='hidden';
}

function _snapToCorner(fp){
  const vw=window.innerWidth,vh=window.innerHeight;
  const r=fp.getBoundingClientRect();
  const m=12, bm=window.innerWidth<768?76:80;
  const isDesk=window.innerWidth>=768&&document.body.classList.contains('float-playing');
  const panel=isDesk?document.getElementById('playerPanel'):null;
  const ph=panel?panel.offsetHeight:192;
  // Use combined bounding box (panel+bar) to decide corner on desktop
  const refTop=isDesk&&panel?panel.getBoundingClientRect().top:r.top;
  const refH=isDesk?ph+r.height:r.height;
  const goLeft=(isDesk&&panel?panel.getBoundingClientRect().left:r.left)+r.width/2<vw/2;
  const goTop=refTop+refH/2<vh/2;
  fp.classList.add('pip-snap');
  if(isDesk&&panel){
    const nx=goLeft?m:vw-340-m;
    const ny=goTop?m:vh-ph-r.height-bm;
    panel.classList.add('pip-snap');
    panel.style.setProperty('left',nx+'px','important');
    panel.style.setProperty('top',ny+'px','important');
    panel.style.setProperty('right','auto','important');
    panel.style.setProperty('bottom','auto','important');
    fp.style.left=nx+'px';
    fp.style.top=(ny+ph)+'px';
    setTimeout(()=>{fp.classList.remove('pip-snap');panel.classList.remove('pip-snap');},280);
  }else{
    fp.style.left=(goLeft?m:vw-r.width-m)+'px';
    fp.style.top=(goTop?m:vh-r.height-bm)+'px';
    fp.style.right='auto'; fp.style.bottom='auto';
    setTimeout(()=>fp.classList.remove('pip-snap'),280);
  }
}

function initPiP(){
  const fp=document.getElementById('floatPlayer');
  const bar=document.getElementById('floatBar');
  if(!fp||!bar)return;

  function _isDesk(){return window.innerWidth>=768&&document.body.classList.contains('float-playing');}
  function _getPanel(){return document.getElementById('playerPanel');}
  // Move the CSS mini-pip panel to an explicit left/top position (overrides CSS right/bottom)
  function _setPanelPos(x,y){
    const panel=_getPanel();
    if(!panel)return;
    panel.style.setProperty('left',x+'px','important');
    panel.style.setProperty('top',y+'px','important');
    panel.style.setProperty('right','auto','important');
    panel.style.setProperty('bottom','auto','important');
  }
  // Get the top-left of the combined unit (panel top-left on desktop, fp top-left on mobile)
  function _getAnchorRect(){
    if(_isDesk()){const panel=_getPanel();if(panel)return panel.getBoundingClientRect();}
    return fp.getBoundingClientRect();
  }

  // ── TOUCH drag via bottom bar ──
  bar.addEventListener('touchstart',e=>{
    if(e.target.closest('.fbar-btn'))return;
    _pipDrag=true;_pipMoved=false;
    const t=e.touches[0];
    _pipSX=t.clientX;_pipSY=t.clientY;
    const ar=_getAnchorRect();
    _pipOX=t.clientX-ar.left;_pipOY=t.clientY-ar.top;
    // Lock current fp position before dragging
    const fr=fp.getBoundingClientRect();
    fp.style.left=fr.left+'px';fp.style.top=fr.top+'px';
    fp.style.right='auto';
    fp.classList.remove('pip-snap');
    bar.classList.add('grabbing');
  },{passive:true});

  document.addEventListener('touchmove',e=>{
    if(!_pipDrag)return;
    e.preventDefault();
    const t=e.touches[0];
    if(Math.abs(t.clientX-_pipSX)>5||Math.abs(t.clientY-_pipSY)>5)_pipMoved=true;
    const x=t.clientX-_pipOX, y=t.clientY-_pipOY;
    if(_isDesk()){
      _setPanelPos(x,y);
      const ph=(_getPanel()||{offsetHeight:192}).offsetHeight;
      fp.style.left=x+'px';fp.style.top=(y+ph)+'px';
    }else{
      fp.style.left=x+'px';fp.style.top=y+'px';
    }
  },{passive:false});

  document.addEventListener('touchend',()=>{
    if(!_pipDrag)return;
    _pipDrag=false;
    bar.classList.remove('grabbing');
    if(!_pipMoved)return;
    const r=fp.getBoundingClientRect();
    if(r.right<-20||r.left>window.innerWidth+20){closeFloat();return;}
    _snapToCorner(fp);
  });

  // ── MOUSE drag via bottom bar (desktop) ──
  bar.addEventListener('mousedown',e=>{
    if(e.target.closest('.fbar-btn'))return;
    _pipDrag=true;_pipMoved=false;
    _pipSX=e.clientX;_pipSY=e.clientY;
    const ar=_getAnchorRect();
    _pipOX=e.clientX-ar.left;_pipOY=e.clientY-ar.top;
    const fr=fp.getBoundingClientRect();
    fp.style.left=fr.left+'px';fp.style.top=fr.top+'px';
    fp.style.right='auto';
    fp.classList.remove('pip-snap');
    bar.classList.add('grabbing');
    e.preventDefault();
  });
  document.addEventListener('mousemove',e=>{
    if(!_pipDrag)return;
    if(Math.abs(e.clientX-_pipSX)>4)_pipMoved=true;
    const x=e.clientX-_pipOX, y=e.clientY-_pipOY;
    if(_isDesk()){
      _setPanelPos(x,y);
      const ph=(_getPanel()||{offsetHeight:192}).offsetHeight;
      fp.style.left=x+'px';fp.style.top=(y+ph)+'px';
    }else{
      fp.style.left=x+'px';fp.style.top=y+'px';
    }
  });
  document.addEventListener('mouseup',()=>{
    if(!_pipDrag)return;
    _pipDrag=false;
    bar.classList.remove('grabbing');
    if(_pipMoved)_snapToCorner(fp);
  });
}

async function fetchArtistImg(name){
  // 1. Wikipedia Hebrew
  try{const r=await fetch(`https://he.wikipedia.org/api/rest_v1/page/summary/${encodeURIComponent(name.replace(/ /g,'_'))}`);
    if(r.ok){const d=await r.json();if(d.thumbnail?.source)return d.thumbnail.source;}
  }catch(e){}
  // 2. iTunes — search by song (artworkUrl100 only exists on song/album results)
  try{const r=await fetch(`https://itunes.apple.com/search?term=${encodeURIComponent(name)}&entity=song&limit=5&country=IL`);
    if(r.ok){const d=await r.json();
      for(const s of(d.results||[])){
        // make sure it's the right artist
        if(s.artworkUrl100&&s.artistName&&s.artistName.toLowerCase().includes(name.slice(0,3).toLowerCase())){
          return s.artworkUrl100.replace('100x100bb','600x600bb');
        }
      }
      // fallback: first result regardless
      if(d.results?.[0]?.artworkUrl100)return d.results[0].artworkUrl100.replace('100x100bb','600x600bb');
    }
  }catch(e){}
  return null;
}

async function loadImages(){
  const avatars=document.querySelectorAll('.artist-avatar[data-artist]');
  const promises=[];
  for(const el of avatars){
    const name=el.dataset.artist;
    if(CUSTOM_PHOTOS[name]){applyPhoto(el,CUSTOM_PHOTOS[name]);IMG_CACHE[name]=CUSTOM_PHOTOS[name];continue;}
  const customPhoto=localStorage.getItem('artist_photo_'+name);
    if(customPhoto){applyPhoto(el,customPhoto);IMG_CACHE[name]=customPhoto;continue;}
    if(IMG_CACHE[name]&&IMG_CACHE[name]!=='none'){applyPhoto(el,IMG_CACHE[name]);continue;}
    if(IMG_CACHE[name]==='none')continue;
    promises.push((async()=>{
      const url=await fetchArtistImg(name);
      if(url){IMG_CACHE[name]=url;document.querySelectorAll(`.artist-avatar[data-artist="${CSS.escape(name)}"]`).forEach(e=>applyPhoto(e,url));}
      else IMG_CACHE[name]='none';
    })());
  }
  await Promise.all(promises);
}

const SESSION_KEY='karaoke_session';
function saveSession(song){try{localStorage.setItem(SESSION_KEY,JSON.stringify({v:song.v,s:song.s,a:song.a,list:currentSongList.map(s=>s.v),idx:currentSongIdx}));}catch(e){}}
function loadSession(){
  try{
    const d=JSON.parse(localStorage.getItem(SESSION_KEY)||'null');
    if(!d)return;
    currentSong={v:d.v,s:d.s,a:d.a};
    // Don't set has-song on page load — home state is always clean (no mini bar)
    const mini=document.getElementById('miniSong');
    const miniA=document.getElementById('miniArtist');
    if(mini)mini.textContent=d.s;
    if(miniA)miniA.textContent=d.a||'';
    const thumb=document.getElementById('miniThumb');
    if(thumb)thumb.style.backgroundImage=`url(https://img.youtube.com/vi/${d.v}/default.jpg)`;
  }catch(e){}
}
function resumeOrOpen(){
  if(!currentSong)return;
  // If player already has a live video, just reopen the panel — don't touch the player
  if(ytPlayer&&playerReady){
    const st=ytPlayer.getPlayerState();
    if(st!==YT.PlayerState.UNSTARTED){
      document.getElementById('playerPanel').classList.add('open');
      document.body.classList.add('playing');
      document.body.style.overflow='hidden';
      requestAnimationFrame(setTopH);
      return;
    }
  }
  // Page was reloaded — restore from session
  const saved=JSON.parse(localStorage.getItem(SESSION_KEY)||'null');
  if(saved&&saved.list){
    const songList2=ALL.filter(s=>saved.list.includes(s.v));
    const idx=Math.max(0,saved.list.indexOf(currentSong.v));
    openModal(currentSong,songList2,idx,0);
  }else{
    openModal(currentSong,[currentSong],0,0);
  }
  if(window.innerWidth<768)document.getElementById('playerPanel').classList.add('open');
}

const _ADM_HASH='213f367b1af015a79e0b0cf92a3d4084e6bd5fbc3fbb4364881b05854bf86924';// SHA-256("8213")
let _admMode=false,_admDirty=false,_atbT=null;

async function _sha256(s){
  const b=await crypto.subtle.digest('SHA-256',new TextEncoder().encode(s));
  return Array.from(new Uint8Array(b)).map(x=>x.toString(16).padStart(2,'0')).join('');
}
function openAdminLogin(){

}

  const pin=document.getElementById('admPin').value;if(!pin)return;
  const h=await _sha256(pin);

  if(h!==saved){document.getElementById('admPinErr').textContent='קוד שגוי, נסה שוב';return;}

// ── DRAG & DROP ──
let _dndType=null,_dndVid=null,_dndQueueVid=null,_dndScrollDir=0,_dndScrollIv=null;
function _dndArtistStart(e,vid){
  _dndType='artist';_dndVid=vid;
  e.dataTransfer.effectAllowed='move';
  e.dataTransfer.setData('text/plain',vid);
  setTimeout(()=>{const el=document.querySelector(`.artist-block[data-vid="${vid}"]`);if(el)el.style.opacity='.4';},0);
}
function _dndSongStart(e,vid){
  _dndType='song';_dndVid=vid;
  e.dataTransfer.effectAllowed='move';
  e.dataTransfer.setData('text/plain',vid);
  setTimeout(()=>{const el=document.querySelector(`tr[data-vid="${vid}"]`);if(el)el.style.opacity='.4';},0);
}
function _dndArtistOver(e,targetVid){
  if(_dndType!=='artist'||_dndVid===targetVid)return;
  e.preventDefault();e.dataTransfer.dropEffect='move';
  document.querySelectorAll('.artist-block').forEach(b=>b.classList.remove('drag-over-above','drag-over-below'));
  const el=document.querySelector(`.artist-block[data-vid="${targetVid}"]`);
  if(el){const r=el.getBoundingClientRect();el.classList.add(e.clientY<r.top+r.height/2?'drag-over-above':'drag-over-below');}
}
function _dndSongOver(e,targetVid){
  if(_dndType!=='song'||_dndVid===targetVid)return;
  const src=ALL.find(s=>(s.v||s.mp4)===_dndVid),tgt=ALL.find(s=>(s.v||s.mp4)===targetVid);
  if(!src||!tgt||src.a!==tgt.a)return;
  e.preventDefault();e.dataTransfer.dropEffect='move';
  document.querySelectorAll('tr[data-vid]').forEach(r=>r.classList.remove('drag-over-above','drag-over-below'));
  const el=document.querySelector(`tr[data-vid="${targetVid}"]`);
  if(el){const r=el.getBoundingClientRect();el.classList.add(e.clientY<r.top+r.height/2?'drag-over-above':'drag-over-below');}
}
function _dndLeave(e){
  if(!e.currentTarget.contains(e.relatedTarget)){
    e.currentTarget.classList.remove('drag-over','drag-over-above','drag-over-below');
  }
}
function _dndArtistDrop(e,targetVid){
  if(_dndType!=='artist'||_dndVid===targetVid)return;
  e.preventDefault();
  const srcName=_artistOf(_dndVid),tgtName=_artistOf(targetVid);
  if(!srcName||!tgtName)return;
  const tgtEl=document.querySelector(`.artist-block[data-vid="${targetVid}"]`);
  const after=tgtEl&&tgtEl.classList.contains('drag-over-below');
  const ord=_artistOrder();
  const groups={};ord.forEach(a=>{groups[a]=ALL.filter(s=>s.a===a);});
  const si=ord.indexOf(srcName);ord.splice(si,1);
  const ti=ord.indexOf(tgtName);ord.splice(after?ti+1:ti,0,srcName);
  _rebuildFromGroups(ord,groups);
  _markDirty();_dndCleanup();render(document.getElementById('q').value||'');
}
function _dndSongDrop(e,targetVid){
  if(_dndType!=='song'||_dndVid===targetVid)return;
  const src=ALL.find(s=>(s.v||s.mp4)===_dndVid),tgt=ALL.find(s=>(s.v||s.mp4)===targetVid);
  if(!src||!tgt||src.a!==tgt.a)return;
  e.preventDefault();
  const tgtEl=document.querySelector(`tr[data-vid="${targetVid}"]`);
  const after=tgtEl&&tgtEl.classList.contains('drag-over-below');
  const si=ALL.indexOf(src);ALL.splice(si,1);
  const ti=ALL.indexOf(tgt);ALL.splice(after?ti+1:ti,0,src);
  _markDirty();_dndCleanup();render(document.getElementById('q').value||'');
}
function _dndEnd(e){_dndCleanup();}
function _dndCleanup(){
  const cls=['drag-over','drag-over-above','drag-over-below'];
  document.querySelectorAll('.artist-block').forEach(el=>{el.classList.remove(...cls);el.style.opacity='';});
  document.querySelectorAll('tr[data-vid]').forEach(el=>{el.classList.remove(...cls);el.style.opacity='';});
  document.querySelectorAll('.queue-item[data-vid]').forEach(el=>{el.classList.remove(...cls);el.style.opacity='';});
  _dndType=null;_dndVid=null;_dndQueueVid=null;
  clearInterval(_dndScrollIv);_dndScrollIv=null;_dndScrollDir=0;
}

// ── ARTIST MANAGEMENT ──
function _artistOf(vid){const s=ALL.find(x=>x.v===vid);return s?s.a:null;}
function _artistOrder(){const seen=new Set(),ord=[];ALL.forEach(s=>{if(!seen.has(s.a)){seen.add(s.a);ord.push(s.a);}});return ord;}
function _rebuildFromGroups(ord,groups){ALL.length=0;ord.forEach(a=>groups[a].forEach(s=>ALL.push(s)));}

function adminRenameArtist(vid){
  const old=_artistOf(vid);if(!old)return;
  const neu=prompt('שם חדש לתיקייה:',old);
  if(!neu||neu===old)return;
  const exists=_artistOrder().includes(neu)&&neu!==old;
  if(exists&&!confirm(`תיקייה "${neu}" כבר קיימת. למזג את השירים?`))return;
  ALL.forEach(s=>{if(s.a===old)s.a=neu;});
  _markDirty();_atbStat('✏️ תיקייה שונה שם','ok');render(document.getElementById('q').value||'');
}
function adminDeleteArtist(vid){
  const name=_artistOf(vid);if(!name)return;
  const cnt=ALL.filter(s=>s.a===name).length;
  if(!confirm(`למחוק את התיקייה "${name}" עם ${cnt} שירים?`))return;
  for(let i=ALL.length-1;i>=0;i--){if(ALL[i].a===name){if(isInQueue(ALL[i].v))removeFromQueue(ALL[i].v);ALL.splice(i,1);}}
  _markDirty();_atbStat('🗑 תיקייה נמחקה','ok');render(document.getElementById('q').value||'');
}
function adminMoveArtistUp(vid){
  const name=_artistOf(vid);if(!name)return;
  const ord=_artistOrder();const idx=ord.indexOf(name);if(idx<=0)return;
  const groups={};ord.forEach(a=>{groups[a]=ALL.filter(s=>s.a===a);});
  [ord[idx-1],ord[idx]]=[ord[idx],ord[idx-1]];
  _rebuildFromGroups(ord,groups);
  _markDirty();render(document.getElementById('q').value||'');
}
function adminMoveArtistDown(vid){
  const name=_artistOf(vid);if(!name)return;
  const ord=_artistOrder();const idx=ord.indexOf(name);if(idx>=ord.length-1)return;
  const groups={};ord.forEach(a=>{groups[a]=ALL.filter(s=>s.a===a);});
  [ord[idx],ord[idx+1]]=[ord[idx+1],ord[idx]];
  _rebuildFromGroups(ord,groups);
  _markDirty();render(document.getElementById('q').value||'');
}

function adminAddSong(){
  let artist=document.getElementById("atbArtist").value.trim();
  if(artist==='__new__'){
    const n=prompt('שם האמן / תיקייה החדשה:','');
    if(!n||!n.trim()){return;}
    artist=n.trim();
  }
  const song=document.getElementById("atbSong").value.trim();
  const url=document.getElementById("atbUrl").value.trim();
  if(!artist||!song){_atbStat("חסר שם אמן או שם שיר","err");return;}
  let entry;
  if(url.match(/\.mp4/i)||url.includes('.r2.dev')){
    if(ALL.some(s=>s.mp4===url)){_atbStat('שיר זה כבר קיים ברשימה','err');return;}
    entry={a:artist,s:song,mp4:url};
  }else{
  const m=url.match(/[?&]v=([A-Za-z0-9_-]+)/);
  if(!m){_atbStat("קישור יוטיוב לא תקין","err");return;}
  const vid=m[1];
  if(ALL.some(s=>s.v===vid)){_atbStat("שיר זה כבר קיים ברשימה","err");return;}
    entry={a:artist,s:song,v:vid};
  }
  const lastIdx=ALL.reduce((li,s,i)=>s.a===artist?i:li,-1);
  if(lastIdx>=0){
    ALL.splice(lastIdx+1,0,entry);
  }else{
    ALL.push(entry);
    const grp={};const ord2=[];
    ALL.forEach(s=>{if(!grp[s.a]){grp[s.a]=[];ord2.push(s.a);}grp[s.a].push(s);});
    ord2.sort((a,b)=>a<b?-1:a>b?1:0);
    ALL.length=0;ord2.forEach(a=>grp[a].forEach(s=>ALL.push(s)));
  }
  document.getElementById("atbSong").value="";
  document.getElementById("atbUrl").value="";
  _fillArtistList();
  document.getElementById("atbArtist").value="";
  document.getElementById("atbSong").focus();
  render(document.getElementById("q").value||"");
  _markDirty();_atbStat("✓ שיר נוסף","ok");
}

  const _os={};document.querySelectorAll('.artist-block[data-vid]').forEach(b=>{_os[b.dataset.vid]=b.dataset.open;});

  document.querySelectorAll('.artist-block[data-vid]').forEach(b=>{if(_os[b.dataset.vid])b.dataset.open=_os[b.dataset.vid];});

}

async function adminSyncGitHub(){
  const token=localStorage.getItem("gh_token");
  if(!token){document.getElementById("admTokenOv").classList.add("open");return;}
  const btn=document.getElementById("atbSyncBtn");
  btn.textContent="מסנכרן...";btn.disabled=true;
  try{
    const r=await fetch("https://api.github.com/repos/israelladani-cyber/shirim-ahuvim/contents/index.html",
      {headers:{"Authorization":"Bearer "+token,"Accept":"application/vnd.github.v3+json"}});
    if(!r.ok)throw new Error("GitHub API שגיאה: "+r.status);
    const d=await r.json();
    const raw=decodeURIComponent(escape(atob(d.content.replace(/\n/g,""))));
    const newAll="const ALL="+JSON.stringify(ALL)+";";
    let newHtml=raw.replace(/const ALL=\[[\s\S]*?\];/,newAll);
    for(const [n,u] of Object.entries(IMG_CACHE||{})){if(u&&u!=="none"&&!CUSTOM_PHOTOS[n])CUSTOM_PHOTOS[n]=u;}
      // Merge localStorage: upload data URLs to GitHub, get real download_url
      for(let _i=0;_i<localStorage.length;_i++){
        const _k=localStorage.key(_i);if(!_k.startsWith('artist_photo_'))continue;
        const _n=_k.replace('artist_photo_',''),_u=localStorage.getItem(_k);
        if(_u&&_u.startsWith('data:')){
          const _ext=_u.startsWith('data:image/webp')?'webp':'jpg',_b64=_u.split(',')[1];
          const _chk=await fetch('https://api.github.com/repos/israelladani-cyber/shirim-ahuvim/contents/photos/'+encodeURIComponent(_n+'.'+_ext),{headers:{'Authorization':'Bearer '+token}});
          const _cj=await _chk.json();const _pb={message:'תמונת '+_n,content:_b64};if(_cj.sha)_pb.sha=_cj.sha;
          const _pr=await fetch('https://api.github.com/repos/israelladani-cyber/shirim-ahuvim/contents/photos/'+encodeURIComponent(_n+'.'+_ext),{method:'PUT',headers:{'Authorization':'Bearer '+token,'Content-Type':'application/json'},body:JSON.stringify(_pb)});
          const _pj=await _pr.json();
          if(_pj.content&&_pj.content.download_url){CUSTOM_PHOTOS[_n]=_pj.content.download_url;localStorage.setItem('artist_photo_'+_n,_pj.content.download_url);}
        }else if(_u&&_u.startsWith('http')){CUSTOM_PHOTOS[_n]=_u;}
      }
    const newCustomPhotos="const CUSTOM_PHOTOS="+JSON.stringify(CUSTOM_PHOTOS)+";";
    newHtml=newHtml.replace(/const CUSTOM_PHOTOS=\{[\s\S]*?\};/,newCustomPhotos);
    if(newHtml===raw)throw new Error("לא ניתן לאתר את מערך השירים בקובץ");
    const enc=btoa(unescape(encodeURIComponent(newHtml)));
    const put=await fetch("https://api.github.com/repos/israelladani-cyber/shirim-ahuvim/contents/index.html",{
      method:"PUT",
      headers:{"Authorization":"Bearer "+token,"Content-Type":"application/json"},
      body:JSON.stringify({message:"עדכון שירים דרך פאנל ניהול",content:enc,sha:d.sha})
    });
    if(!put.ok){const e=await put.json();throw new Error(e.message||"שגיאה "+put.status);}
    _admDirty=false;
    btn.style.outline="none";btn.title="";
    btn.textContent="✓ נשמר!";
    setTimeout(()=>btn.textContent="⟳ שמור ב-GitHub",3000);
    _atbStat("✓ עודכן ב-GitHub בהצלחה","ok");
  document.getElementById("atbArtist").value="";
  document.getElementById("atbSong").value="";
  document.getElementById("atbUrl").value="";
  }catch(e){
    _atbStat("שגיאה: "+e.message,"err");
    btn.textContent="⟳ שמור ב-GitHub";
  }finally{btn.disabled=false;}
}
</script>
